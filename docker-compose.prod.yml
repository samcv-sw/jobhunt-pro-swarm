version: '3.8'

services:
  # ----------------------------------------
  # JobHunt Pro Application (Backend/Orchestrator)
  # ----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    container_name: jobhunt-app-prod
    restart: always
    env_file:
      - .env.cloud
    environment:
      - CLOUD_MODE=true
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------
  # Nginx Reverse Proxy (Handles HTTPS & Web Traffic)
  # ----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: jobhunt-nginx-prod
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------
  # Certbot (Let's Encrypt SSL Auto-Renewal)
  # ----------------------------------------
  certbot:
    image: certbot/certbot
    container_name: jobhunt-certbot-prod
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# Note: PostgreSQL and Redis are intentionally omitted from this file.
# In a zero-cost architecture, we use Neon PostgreSQL and external Redis (or internal memory structures)
# to keep the Oracle Cloud VM resources fully dedicated to processing jobs and avoiding OOM errors.

volumes:
  app_data:
  app_logs:
  certbot_www:
  certbot_certs:
