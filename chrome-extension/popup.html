<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; }
    .header { background: linear-gradient(135deg, #00f0ff20, #7000ff20); padding: 16px; border-bottom: 1px solid #00f0ff33; }
    .header h1 { font-size: 18px; color: #00f0ff; display: flex; align-items: center; gap: 8px; }
    .header p { font-size: 11px; color: #888; margin-top: 4px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: #ffffff05; }
    .stat { text-align: center; padding: 8px; background: #ffffff08; border-radius: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #00f0ff; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; }
    .actions { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; }
    .btn-primary { background: linear-gradient(135deg, #00f0ff, #0088ff); color: #000; }
    .btn-secondary { background: #ffffff10; color: #00f0ff; border: 1px solid #00f0ff33; }
    .btn-danger { background: #ff004433; color: #ff4488; border: 1px solid #ff004433; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { padding: 8px 12px; font-size: 11px; color: #888; text-align: center; }
    .status.connected { color: #00ff88; }
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 12px 12px; }
    .q-btn { padding: 6px 8px; background: #ffffff05; border: 1px solid #ffffff10; border-radius: 4px; color: #ccc; cursor: pointer; font-size: 11px; }
    .q-btn:hover { background: #ffffff10; }
    .footer { padding: 12px; text-align: center; border-top: 1px solid #ffffff10; }
    .footer a { color: #00f0ff; font-size: 11px; text-decoration: none; }
    .badge { display: inline-block; padding: 2px 6px; background: #00f0ff22; color: #00f0ff; border-radius: 3px; font-size: 9px; margin-left: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ JobHunt Pro <span class="badge">v1.0</span></h1>
    <p>AI Auto-Apply Assistant</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="appsToday">0</div>
      <div class="stat-label">Apps Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="matchRate">0%</div>
      <div class="stat-label">Match Rate</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="coverLetters">0</div>
      <div class="stat-label">Cover Letters</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timeSaved">0h</div>
      <div class="stat-label">Time Saved</div>
    </div>
  </div>

  <div class="status" id="statusBar">🔌 Not connected</div>

  <div class="actions">
    <button class="btn btn-primary" id="btnAutoApply">🚀 Auto-Apply to This Job</button>
    <button class="btn btn-secondary" id="btnFillForm">📝 Auto-Fill Application Form</button>
    <button class="btn btn-secondary" id="btnGenerateCL">✍️ Generate Cover Letter</button>
    <button class="btn btn-secondary" id="btnCheckATS">📊 Check ATS Score</button>
  </div>

  <div class="quick-actions">
    <button class="q-btn" id="btnDashboard">📊 Dashboard</button>
    <button class="q-btn" id="btnSettings">⚙️ Settings</button>
    <button class="q-btn" id="btnBulkApply">💼 Bulk Apply</button>
    <button class="q-btn" id="btnCampaign">🎯 Campaign</button>
  </div>

  <div class="footer">
    <a href="https://jhfguf.pythonanywhere.com" target="_blank">Open Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
