<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobHunt Pro - AI Resume</title>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glass-container">
        <header class="app-header">
            <div class="logo">JobHunt Pro</div>
            <div class="global-selector" style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 1.2em;">🌍</span>
                <select id="langSelect" style="background: #1e1e2f; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; font-size: 0.9em; outline: none;">
                    <option value="en">English (Global)</option>
                    <option value="es">Español (LatAm)</option>
                    <option value="hi">हिन्दी (India)</option>
                    <option value="ru">Русский (CIS)</option>
                    <option value="pt">Português (Brazil)</option>
                </select>
            </div>
        </header>

        <main>
            <div class="card pulse">
                <div class="icon">🚀</div>
                <h2>AI Resume Booster</h2>
                <p>Unlock our global AI swarm to automatically apply you to 500 remote jobs worldwide.</p>
                
                <div class="stats-row">
                    <div class="stat">
                        <span class="value" id="invite-count">0/5</span>
                        <span class="label">Invites</span>
                    </div>
                    <div class="stat">
                        <span class="value" id="credit-count">0</span>
                        <span class="label">Credits</span>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="invite-btn" class="btn primary">
                    <span class="btn-icon">🔗</span> Invite 5 Friends (Free)
                </button>
                <div class="divider">OR</div>
                <button id="pay-btn" class="btn secondary">
                    <span class="btn-icon">💎</span> Unlock Now ($20 Crypto)
                </button>
            </div>
        </main>
        
        <footer>
            <p>Powered by Advanced AI Swarm Tech</p>
        </footer>
    </div>
    <script src="app.js"></script>

</body>
</html>
