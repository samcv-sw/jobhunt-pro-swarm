<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time ATS Resume Sculptor | JobHunt Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-block-size: 100vh;
            padding-inline: 1.5rem;
            padding-block: 2rem;
            background-image: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 20% 80%, rgba(245, 158, 11, 0.15) 0%, transparent 40%);
        }

        .container {
            max-inline-size: 1200px;
            margin-inline: auto;
        }

        .header {
            margin-block-end: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-block-start: 0.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-block-end: 1rem;
            color: #93c5fd;
        }

        .form-group {
            margin-block-end: 1rem;
        }

        .form-group label {
            display: block;
            margin-block-end: 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            inline-size: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            dir: auto;
        }

        textarea.form-control {
            min-block-size: 140px;
            resize: vertical;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            inline-size: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-block-start: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .score-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.8);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-block-end: 1rem;
            border: 1px solid var(--border-color);
        }

        .score-value {
            font-size: 2rem;
            font-weight: 800;
            color: #10b981;
        }

        .tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-inline-end: 0.3rem;
            margin-block-end: 0.3rem;
        }

        .tag-match { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .tag-missing { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .resume-output {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 10px;
            padding: 1.2rem;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            max-block-size: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Real-Time Live ATS Resume Sculptor</h1>
            <p>تحسين وتطابق السيرة الذاتية لحظياً لرفع نسبة القبول في أنظمة التصفية الآلية (ATS)</p>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h2>📝 السيرة الذاتية ووصف الوظيفة</h2>
                <form id="atsForm">
                    <div class="form-group">
                        <label>المسمى الوظيفي المستهدف</label>
                        <input type="text" id="jobTitle" class="form-control" placeholder="Senior Backend Developer" value="Senior Backend Developer" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>السيرة الذاتية الحالية (النص الكامل)</label>
                        <textarea id="originalResume" class="form-control" placeholder="أدخل نص السيرة الذاتية..." dir="auto">Experienced software engineer with expertise in Python, FastAPI, Docker, and REST APIs. Built multiple cloud microservices and databases.</textarea>
                    </div>
                    <div class="form-group">
                        <label>الوصف الوظيفي (Job Description)</label>
                        <textarea id="jobDescription" class="form-control" placeholder="أدخل الوصف الوظيفي للإعلان..." dir="auto">We are looking for a Senior Backend Developer proficient in Python, FastAPI, AWS, Docker, PostgreSQL, and Redis. Experience with microservices and security best practices is required.</textarea>
                    </div>
                    <button type="submit" class="btn-submit">⚡ إعادة صياغة وتطابق ATS فوراً</button>
                </form>
            </div>

            <div class="card">
                <h2>📊 نتائج التحليل والتعديل الفوري</h2>
                <div id="resultsArea">
                    <p style="color: var(--text-muted); text-align: center; margin-block-start: 4rem;">
                        قم بتعبيئة البيانات واضغط على التزر للبدء بنحت السيرة الذاتية وفق معايير ATS.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('atsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<p style="color: #60a5fa; text-align: center;">جاري نحت السيرة الذاتية بالذكاء الاصطناعي...</p>';

            const payload = {
                job_title: document.getElementById('jobTitle').value,
                original_resume: document.getElementById('originalResume').value,
                job_description: document.getElementById('jobDescription').value
            };

            try {
                const res = await fetch('/api/v1/ats-sculptor/sculpt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                let matchedTags = data.matched_keywords.map(k => `<span class="tag tag-match">✓ ${k}</span>`).join('');
                let missingTags = data.missing_keywords.map(k => `<span class="tag tag-missing">✗ ${k}</span>`).join('');

                resultsArea.innerHTML = `
                    <div class="score-box">
                        <div>
                            <div style="color: var(--text-muted); font-size: 0.85rem;">نسبة التطابق مع ATS</div>
                            <div style="font-size: 1.1rem; font-weight: 700; color: #fff;">ممتازة ومهيأة للعبور</div>
                        </div>
                        <div class="score-value">${data.ats_score}%</div>
                    </div>

                    <div style="margin-block-end: 1rem;">
                        <h4 style="font-size: 0.9rem; color: #94a3b8; margin-block-end: 0.4rem;">الكلمات المفتاحية المتطابقة:</h4>
                        <div>${matchedTags}</div>
                    </div>

                    <div style="margin-block-end: 1rem;">
                        <h4 style="font-size: 0.9rem; color: #94a3b8; margin-block-end: 0.4rem;">الكلمات الموصى بإضافتها:</h4>
                        <div>${missingTags}</div>
                    </div>

                    <h4 style="font-size: 0.95rem; color: #93c5fd; margin-block-end: 0.5rem;">السيرة الذاتية المنقحة جاهزة للتحميل (Markdown):</h4>
                    <div class="resume-output">${data.tailored_resume_markdown}</div>
                `;
            } catch (err) {
                resultsArea.innerHTML = '<p style="color: #ef4444; text-align: center;">حدث خطأ أثناء الاتصال بالخادم.</p>';
            }
        });
    </script>
</body>
</html>
