<!-- ═══ UNIFIED PUBLIC NAVIGATION ═══ -->
<nav class="nav" id="nav" style="padding:14px 28px;display:flex;justify-content:space-between;align-items:center;background:rgba(5,5,15,0.75);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border:1px solid rgba(255,255,255,0.08);border-radius:24px;">
<a class="nav-logo" href="/" style="font-family:'Cairo',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,#00f0ff 0%,#00b8ff 40%,#00f0ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:10px;text-decoration:none;">جوبهانت برو <span class="badge" style="font-size:9px;font-weight:700;background:rgba(0,240,255,0.12);color:#00f0ff;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,240,255,0.2);-webkit-text-fill-color:#00f0ff;">v{{ VERSION|default('16.3') }}</span></a>
<div aria-label="القائمة" class="nav-hamburger" id="hamburger" onclick="toggleMenu()" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;z-index:1001;">
<span style="width:24px;height:2px;background:#ffffff;border-radius:2px;transition:all 0.3s;"></span>
<span style="width:24px;height:2px;background:#ffffff;border-radius:2px;transition:all 0.3s;"></span>
<span style="width:24px;height:2px;background:#ffffff;border-radius:2px;transition:all 0.3s;"></span>
</div>
<div class="nav-links" id="navLinks" style="display:flex;gap:4px;align-items:center;">
<a class="lang-switcher" href="/lang/en" onmouseout="this.style.background='rgba(255,255,255,0.05)'" onmouseover="this.style.background='rgba(255,255,255,0.1)'" style="display:flex;align-items:center;gap:6px;color:#e2e8f0;text-decoration:none;font-size:14px;font-weight:700;padding:6px 12px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);transition:all 0.2s;margin-inline-start: 12px;">
<span style="font-size:16px;">🌐</span> {{ _('English') }}
  </a>
<a href="/" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">الرئيسية</a>
<a href="/pricing" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">الأسعار</a>
<a href="/blog" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">المدونة</a>
<a href="/faq" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">الأسئلة الشائعة</a>
<a href="/trust" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">الثقة</a>
<a href="/contact" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">اتصل بنا</a>
  {% if is_logged_in %}
   <a href="/dashboard" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">غرفة القيادة</a>
<a class="cta" href="/logout" style="background:linear-gradient(135deg,#ef4444,#b91c1c);color:#ffffff;font-weight:700;padding:10px 22px;border-radius:12px;box-shadow:0 0 20px rgba(239,68,68,0.15);text-decoration:none;font-size:13px;transition:all 0.3s;">تسجيل خروج</a>
  {% else %}
   <a href="/login" style="color:#8a8a9e;text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;transition:all 0.3s;">دخول</a>
<a class="cta" href="/register" style="background:linear-gradient(135deg,#6366f1,#a855f7);color:#ffffff;font-weight:700;padding:10px 22px;border-radius:12px;box-shadow:0 0 20px rgba(99,102,241,0.15);text-decoration:none;font-size:13px;transition:all 0.3s;">ابدأ مجاناً</a>
  {% endif %}
 </div>
</nav>
<style>
#nav {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 48px);
    max-width: 1300px;
    z-index: 1000;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
{% if is_dashboard %}
@media (min-width: 768px) {
    #nav {
        left: auto;
        transform: none;
        width: auto;
        inset-inline-start: 280px;
        inset-inline-end: 24px;
    }
}
{% endif %}
/* Handle hover states and mobile menu for inline nav */
.nav-links a:not(.cta):hover { color: #fff !important; background: rgba(255,255,255,0.05) !important; }
.nav-links a.cta:hover { box-shadow: 0 0 35px rgba(0,240,255,0.35) !important; transform: translateY(-1px); }

@media (max-width: 992px) {
    .nav-hamburger { display: flex !important; }
    .nav-links {
        position: fixed; top: 0; inset-inline-start: -100%; width: 300px; max-width: 100vw; height: 100vh;
        background: rgba(3,3,12,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-inline-end: 1px solid rgba(255,255,255,0.05); flex-direction: column; justify-content: center;
        padding: 40px; transition: inset-inline-start 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-links.active { inset-inline-start: 0; }
    .nav-links a { width: 100%; text-align: center; padding: 15px; font-size: 16px !important; }
    .nav-hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.active span:nth-child(2) { opacity: 0; }
    .nav-hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
}
</style>
<script>
if(typeof toggleMenu !== 'function') {
    function toggleMenu() {
        document.getElementById('hamburger').classList.toggle('active');
        document.getElementById('navLinks').classList.toggle('active');
    }
}
</script>
