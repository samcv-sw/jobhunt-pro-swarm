<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SDR Cold Outreach | JobHunt Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-block-size: 100vh;
            padding-inline: 1.5rem;
            padding-block: 2rem;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 40%);
        }

        .container {
            max-inline-size: 1200px;
            margin-inline: auto;
        }

        .header {
            margin-block-end: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-block-start: 0.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-block-end: 1rem;
            color: #a5b4fc;
        }

        .form-group {
            margin-block-end: 1rem;
        }

        .form-group label {
            display: block;
            margin-block-end: 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            inline-size: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            dir: auto;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            inline-size: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-block-start: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .sequence-box {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            padding: 1rem;
            margin-block-end: 1rem;
            border-inline-start: 4px solid var(--accent);
        }

        .sequence-box h4 {
            color: #6ee7b7;
            margin-block-end: 0.5rem;
        }

        .sequence-box pre {
            white-space: pre-wrap;
            font-family: inherit;
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            margin-inline-end: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI SDR Cold Outreach Engine</h1>
            <p>مولّد أوتوماتيكي لرسائل التواصل الموجهة لمسؤولي التوظيف على LinkedIn والبريد الإلكتروني</p>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h2>📋 معلومات المترشح والهدف</h2>
                <form id="sdrForm">
                    <div class="form-group">
                        <label>اسم المترشح</label>
                        <input type="text" id="candidateName" class="form-control" placeholder="سامي أحمد" value="سامي أحمد" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>المسمى الوظيفي المستهدف</label>
                        <input type="text" id="targetRole" class="form-control" placeholder="Senior Full Stack Engineer" value="Senior Full Stack Engineer" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>أبرز الإنجازات (تفصل بفاصلة)</label>
                        <input type="text" id="keyAchievements" class="form-control" placeholder="تحسين السرعة 40%, بناء أنظمة SaaS" value="تحسين أداء الخوادم بنسبة 45%، بناء منصات SaaS قادرة على استيعاب 100k+ مستخدم" dir="auto">
                    </div>
                    <div class="form-group">
                        <label>اسم مسؤول التوظيف (Recruiter)</label>
                        <input type="text" id="recruiterName" class="form-control" placeholder="سارة محمود" value="سارة محمود" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>الشركة المستهدفة</label>
                        <input type="text" id="recruiterCompany" class="form-control" placeholder="TechCorp Global" value="TechCorp Global" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>قناة التواصل</label>
                        <select id="channel" class="form-control">
                            <option value="linkedin">LinkedIn Direct Message</option>
                            <option value="email">Cold Email</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">🚀 توليد تسلسل التواصل الذكي</button>
                </form>
            </div>

            <div class="card">
                <h2>✉️ تسلسل الرسائل التلقائي (Sequence Output)</h2>
                <div id="outputArea">
                    <p style="color: var(--text-muted); text-align: center; margin-block-start: 3rem;">
                        قم بتعبئة البيانات اضغط على "توليد" لعرض الرسائل التلقائية المقترحة.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sdrForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = '<p style="color: #a5b4fc; text-align: center;">جاري توليد الرسائل التلقائية بالذكاء الاصطناعي...</p>';

            const payload = {
                candidate_name: document.getElementById('candidateName').value,
                target_role: document.getElementById('targetRole').value,
                key_achievements: document.getElementById('keyAchievements').value.split('،').join(',').split(','),
                recruiter: {
                    name: document.getElementById('recruiterName').value,
                    company: document.getElementById('recruiterCompany').value,
                    role: "Talent Acquisition Specialist"
                },
                channel: document.getElementById('channel').value
            };

            try {
                const res = await fetch('/api/v1/sdr-outreach/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                outputArea.innerHTML = `
                    <div style="margin-block-end: 1rem;">
                        <span class="badge">نسبة الملائمة لـ ATS: ${data.ats_relevance_score}%</span>
                        <span class="badge" style="background: rgba(99, 102, 241, 0.2); color: #818cf8;">القناة: ${data.channel}</span>
                    </div>
                    <div class="sequence-box">
                        <h4>الرسالة الأولى (Initial Contact)</h4>
                        <pre>${data.initial_message}</pre>
                    </div>
                    <div class="sequence-box">
                        <h4>رسالة المتابعة 1 (Follow Up #1)</h4>
                        <pre>${data.follow_up_1}</pre>
                    </div>
                    <div class="sequence-box">
                        <h4>رسالة المتابعة 2 (Follow Up #2)</h4>
                        <pre>${data.follow_up_2}</pre>
                    </div>
                `;
            } catch (err) {
                outputArea.innerHTML = '<p style="color: #ef4444; text-align: center;">حدث خطأ أثناء الاتصال بالخادم.</p>';
            }
        });
    </script>
</body>
</html>
