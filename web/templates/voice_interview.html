<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Interviewer | JobHunt Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(18, 26, 43, 0.8);
            --primary: #6366f1;
            --accent: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-block-size: 100vh;
        }
        .container {
            max-inline-size: 800px;
            inline-size: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-block-end: 0.5rem;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-block-end: 2rem;
        }
        .waveform-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            block-size: 80px;
            margin-block: 2rem;
        }
        .bar {
            inline-size: 6px;
            block-size: 20px;
            background: var(--primary);
            border-radius: 4px;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }
        .bar:nth-child(5) { animation-delay: 0.8s; }
        @keyframes pulse {
            0%, 100% { block-size: 15px; opacity: 0.4; }
            50% { block-size: 65px; opacity: 1; background: var(--accent); }
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ محاكي المقابلات الصوتية الذكي (Voice AI Interviewer)</h1>
        <p class="subtitle">قم ببدء الجلسة للتحدث المباشر وتقييم مهاراتك القيادية والتكنيكية بالذكاء الاصطناعي</p>

        <div class="waveform-container">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="alert('بدء المقابلة الصوتية التفاعلية...')">بدء المقابلة الصوتية Live 🚀</button>
        </div>
    </div>
</body>
</html>
