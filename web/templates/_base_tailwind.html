<!DOCTYPE html>
<html lang="{{ lang | default('ar') }}" class="dark" dir="{{ 'rtl' if (lang | default('ar')) in ['ar', 'he', 'fa', 'ur'] else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Global SEO & Hreflang Tags -->
    <link rel="canonical" href="https://jhfguf.pythonanywhere.com{{ request.url.path if request else '' }}">
    <link rel="alternate" hreflang="ar" href="https://jhfguf.pythonanywhere.com{{ request.url.path if request else '' }}">
    <link rel="alternate" hreflang="en" href="https://jhfguf.pythonanywhere.com/en{{ request.url.path if request else '' }}">
    <link rel="alternate" hreflang="x-default" href="https://jhfguf.pythonanywhere.com{{ request.url.path if request else '' }}">
    
    <!-- JSON-LD Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "JobHunt Pro",
      "url": "https://jhfguf.pythonanywhere.com",
      "logo": "https://jhfguf.pythonanywhere.com/static/img/icon-192.png",
      "description": "AI-Powered Job Hunting Platform",
      "sameAs": [
        "https://www.linkedin.com/company/jobhunt-pro"
      ]
    }
    </script>

    <!-- Resource Hints & Preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/static/css/premium-ui.css" as="style">

    <title>{{ title | default('جوبهانت برو — هايدرا') }}</title>
    
    <!-- Meta tags -->
    <meta name="description" content="{{ description | default('جوبهانت برو: نظام الذكاء الاصطناعي اللامركزي الأكثر تطوراً للتقديم على الوظائف في العالم.') }}">
    <meta name="theme-color" content="#0a0a0f">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="preload" as="style" onload="this.rel='stylesheet'">
    <style>
        @layer legacy, premium;
        @import url("/static/css/dashboard-v4.css?v=20260629_v2") layer(legacy);
        @import url("/static/css/premium-ui.css") layer(premium);
    </style>
    
    
    <style>
        :root {
            --text-x-direction: {{ '-1' if (lang | default('ar')) in ['ar', 'he', 'fa', 'ur'] else '1' }}; /* For dynamic mirroring */
        }
        /* Mirror lucide icons when RTL */
        [dir="rtl"] .lucide-dir-aware {
            transform: scaleX(var(--text-x-direction));
        }
    </style>
    
    <!-- Tailwind CSS (CDN for immediate deployment) -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        display: ['Cairo', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        slate: {
                            850: '#141b2d',
                            900: '#0f111a',
                            950: '#0a0a0f',
                        },
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        },
                        magenta: {
                            400: '#e879f9',
                            500: '#d946ef',
                        }
                    },
                    animation: {
                        'radar-ping': 'radar-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite',
                        'matrix-rain': 'matrix-rain 20s linear infinite',
                    },
                    keyframes: {
                        'radar-ping': {
                            '0%': { transform: 'scale(0.5)', opacity: '0.8' },
                            '100%': { transform: 'scale(2.5)', opacity: '0' }
                        },
                        'matrix-rain': {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- Custom Overrides -->
    <link rel="stylesheet" href="/static/css/tailwind_overrides-rtl.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-900 text-slate-300 font-sans antialiased selection:bg-indigo-500/30 overflow-x-hidden" x-data="{ sidebarOpen: false }">
    
    <!-- Global Navigation -->
    {% include "_public_nav.html" %}

    <!-- Main Content -->
    <main class="{% block main_class %}pt-28 pb-16 min-h-screen{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <!-- Initialize Icons -->
    <script>
        lucide.createIcons();
    </script>
    <script>
        // Auto inject dir="auto" into all inputs as per Gulf Premium constraints
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if (!el.hasAttribute('dir')) {
                    el.setAttribute('dir', 'auto');
                }
            });
        });
    </script>
<script src="/static/js/global-animations.js" defer></script>
</body>
</html>
