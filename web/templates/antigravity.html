<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/css/cyberpunk.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTI-GRAVITY MODE — JobHunt Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

body {
 font-family: 'Rajdhani', sans-serif;
 background: #0a0a1a;
 color: #fff;
 overflow: hidden;
 height: 100vh;
 width: 100vw;
 user-select: none;
}

/* Three.js canvas */
#three-canvas {
 position: fixed;
 top: 0; left: 0;
 width: 100vw; height: 100vh;
 z-index: 0;
}

/* HUD overlay */
.hud {
 position: fixed;
 z-index: 10;
 pointer-events: none;
}
.hud * { pointer-events: auto; }

/* Top bar */
.top-bar {
 top: 0; left: 0; right: 0;
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 20px 30px;
 background: linear-gradient(180deg, rgba(10,10,30,0.9) 0%, transparent 100%);
}

.logo {
 font-family: 'Orbitron', monospace;
 font-size: 18px;
 font-weight: 900;
 background: linear-gradient(135deg, #00f0ff, #7b2ff7);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 text-shadow: 0 0 30px rgba(0,240,255,0.3);
 letter-spacing: 3px;
}

.anti-text {
 font-family: 'Orbitron', monospace;
 font-size: 40px;
 font-weight: 900;
 text-align: center;
 text-transform: uppercase;
 letter-spacing: 10px;
 animation: pulse-glow 2s ease-in-out infinite;
 text-shadow: 0 0 40px rgba(123,47,247,0.6);
}

@keyframes pulse-glow {
 0%, 100% { opacity:0.8; text-shadow:0 0 20px rgba(0,240,255,0.4); }
 50% { opacity:1; text-shadow:0 0 60px rgba(123,47,247,0.8), 0 0 120px rgba(0,240,255,0.3); }
}

/* Controls */
.controls {
 position: fixed;
 bottom: 40px;
 left: 50%;
 transform: translateX(-50%);
 z-index: 10;
 display: flex;
 gap: 15px;
 flex-wrap: wrap;
 justify-content: center;
}

.ctrl-btn {
 font-family: 'Orbitron', monospace;
 font-size: 13px;
 font-weight: 700;
 padding: 12px 28px;
 border: 1px solid rgba(0,240,255,0.3);
 background: rgba(10,10,30,0.8);
 color: #00f0ff;
 cursor: pointer;
 border-radius: 4px;
 text-transform: uppercase;
 letter-spacing: 2px;
 transition: all 0.3s ease;
 backdrop-filter: blur(10px);
}
.ctrl-btn:hover {
 background: rgba(0,240,255,0.15);
 border-color: #00f0ff;
 box-shadow: 0 0 30px rgba(0,240,255,0.3);
 transform: translateY(-2px);
}
.ctrl-btn.active {
 background: rgba(123,47,247,0.3);
 border-color: #7b2ff7;
 box-shadow: 0 0 30px rgba(123,47,247,0.4);
}
.ctrl-btn.danger {
 border-color: rgba(255,50,50,0.4);
 color: #ff4444;
}
.ctrl-btn.danger:hover {
 background: rgba(255,50,50,0.15);
 border-color: #ff4444;
 box-shadow: 0 0 30px rgba(255,50,50,0.3);
}

/* Stats floating cards */
#stats-display {
 position: fixed;
 top: 80px;
 right: 30px;
 z-index: 10;
 pointer-events: none;
 text-align: right;
}

.stat-line {
 font-family: 'Rajdhani', sans-serif;
 font-size: 14px;
 color: rgba(255,255,255,0.6);
 line-height: 1.8;
 text-shadow: 0 0 20px rgba(0,0,0,0.8);
}
.stat-line span {
 color: #00f0ff;
 font-weight: 700;
 font-size: 16px;
}

/* Hint */
.hint {
 position: fixed;
 bottom: 100px;
 left: 50%;
 transform: translateX(-50%);
 z-index: 10;
 font-family: 'Rajdhani', sans-serif;
 font-size: 13px;
 color: rgba(255,255,255,0.3);
 letter-spacing: 2px;
 text-align: center;
 animation: fade-pulse 3s ease-in-out infinite;
 pointer-events: none;
}
@keyframes fade-pulse {
 0%, 100% { opacity:0.3; }
 50% { opacity:0.7; }
}

/* Loading overlay */
#loading {
 position: fixed;
 inset: 0;
 z-index: 100;
 background: #0a0a1a;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 font-family: 'Orbitron', monospace;
 font-size: 16px;
 color: #00f0ff;
 letter-spacing: 4px;
 transition: opacity 0.8s ease;
}
#loading.hidden {
 opacity: 0;
 pointer-events: none;
}
.loading-bar {
 width: 200px;
 height: 2px;
 background: rgba(0,240,255,0.1);
 margin-top: 20px;
 border-radius: 2px;
 overflow: hidden;
}
.loading-fill {
 height: 100%;
 width: 0%;
 background: linear-gradient(90deg, #00f0ff, #7b2ff7);
 border-radius: 2px;
 animation: load-fill 2s ease-in-out forwards;
}
@keyframes load-fill {
 0% { width: 0%; }
 100% { width: 100%; }
}

/* Responsive */
@media (max-width: 768px) {
 .anti-text { font-size: 24px; letter-spacing: 5px; }
 .controls { bottom: 20px; gap: 8px; }
 .ctrl-btn { font-size: 10px; padding: 8px 14px; }
 #stats-display { top: 70px; right: 15px; }
 .stat-line { font-size: 11px; }
 .top-bar { padding: 12px 15px; }
 .logo { font-size: 13px; }
}
</style>
</head>
<body class="cyberpunk-body">

<div id="loading">
 <div>INITIALIZING ANTI-GRAVITY FIELD</div>
 <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="three-canvas"></div>

<div class="hud top-bar">
 <div class="logo">JOBHUNT PRO // ANTI-GRAVITY</div>
 <div class="anti-text" id="mode-title">ZERO G</div>
 <div style="width:200px"></div>
</div>

<div id="stats-display">
 <div class="stat-line">AGENTS: <span id="s-agents">20,000</span></div>
 <div class="stat-line">CYCLES: <span id="s-cycles">0</span></div>
 <div class="stat-line">FLOATING: <span id="s-floating">0</span></div>
 <div class="stat-line">G-FORCE: <span id="s-gforce">0.0G</span></div>
</div>

<div class="hint">CLICK TO LAUNCH // DRAG TO ROTATE // SCROLL TO ZOOM</div>

<div class="controls">
 <button class="ctrl-btn active" id="btn-antigravity" onclick="toggleGravity()">ANTI-GRAVITY</button>
 <button class="ctrl-btn" id="btn-gravity" onclick="toggleGravity()">GRAVITY</button>
 <button class="ctrl-btn" onclick="doBarrelRoll()">BARREL ROLL</button>
 <button class="ctrl-btn" onclick="spawnCard()">SPAWN CARD</button>
 <button class="ctrl-btn" onclick="spawnBurst()">PARTICLE BURST</button>
 <button class="ctrl-btn danger" onclick="resetScene()">RESET</button>
</div>

<script>
// ====================================================================
// WEB AUDIO API - FUTURISTIC SCI-FI SYNTHESIZER
// ====================================================================
let audioCtx = null;

function initAudio() {
 if (!audioCtx) {
 audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 if (audioCtx.state === 'suspended') {
 audioCtx.resume();
 }
}

function playSynthSound(type) {
 try {
 initAudio();
 if (!audioCtx) return;
 
 const osc = audioCtx.createOscillator();
 const gain = audioCtx.createGain();
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 
 const now = audioCtx.currentTime;
 
 if (type === 'launch') {
 osc.type = 'sawtooth';
 osc.frequency.setValueAtTime(150, now);
 osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
 
 gain.gain.setValueAtTime(0.15, now);
 gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
 
 osc.start(now);
 osc.stop(now + 0.3);
 } else if (type === 'spawn') {
 osc.type = 'sine';
 osc.frequency.setValueAtTime(880, now);
 osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);
 
 gain.gain.setValueAtTime(0.1, now);
 gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
 
 osc.start(now);
 osc.stop(now + 0.2);
 } else if (type === 'roll') {
 osc.type = 'triangle';
 osc.frequency.setValueAtTime(80, now);
 osc.frequency.linearRampToValueAtTime(300, now + 0.5);
 osc.frequency.linearRampToValueAtTime(80, now + 1.0);
 
 gain.gain.setValueAtTime(0.2, now);
 gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
 
 osc.start(now);
 osc.stop(now + 1.2);
 }
 } catch (e) {
 console.warn("Web Audio API not supported or blocked by browser:", e);
 }
}

// ====================================================================
// THREE.JS ANTI-GRAVITY SCENE
// ====================================================================

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0008);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 0, 300);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a1a, 1);
document.getElementById('three-canvas').appendChild(renderer.domElement);

// ====================================================================
// STATE
// ====================================================================
const state = {
 antigravity: true,
 gForce: 0.0,
 floatingCount: 0,
 cycleCount: 0,
 mouse: { x: 0, y: 0, targetX: 0, targetY: 0 },
 isDragging: false,
 prevMouse: { x: 0, y: 0 },
 rotationVelocity: { x: 0, y: 0 },
};

// Object groups
const floatingCards = [];
const particles = [];
const stars = [];

// ====================================================================
// LIGHTS
// ====================================================================
const ambient = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambient);

const light1 = new THREE.PointLight(0x00f0ff, 1, 500);
light1.position.set(100, 100, 100);
scene.add(light1);

const light2 = new THREE.PointLight(0x7b2ff7, 0.8, 500);
light2.position.set(-100, -100, 100);
scene.add(light2);

// Central glow
const glowGeo = new THREE.SphereGeometry(5, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.3 });
const glowSphere = new THREE.Mesh(glowGeo, glowMat);
scene.add(glowSphere);

// ====================================================================
// STARFIELD (20,000 particles to match our 20,000 agents)
// ====================================================================
function createStarfield() {
 const count = 20000;
 const positions = new Float32Array(count * 3);
 const colors = new Float32Array(count * 3);
 const sizes = new Float32Array(count);
 
 for (let i = 0; i < count; i++) {
 const radius = 200 + Math.random() * 1800;
 const theta = Math.random() * Math.PI * 2;
 const phi = Math.acos(2 * Math.random() - 1);
 
 positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
 positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
 positions[i*3+2] = radius * Math.cos(phi);
 
 const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.8, 0.5 + Math.random() * 0.4);
 colors[i*3] = c.r;
 colors[i*3+1] = c.g;
 colors[i*3+2] = c.b;
 
 sizes[i] = 0.3 + Math.random() * 1.2;
 }
 
 const geo = new THREE.BufferGeometry();
 geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
 geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
 geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
 
 const mat = new THREE.PointsMaterial({
 size: 0.8,
 vertexColors: true,
 transparent: true,
 opacity: 0.9,
 blending: THREE.AdditiveBlending,
 sizeAttenuation: true,
 });
 
 const starField = new THREE.Points(geo, mat);
 scene.add(starField);
 return starField;
}

const starField = createStarfield();

// ====================================================================
// FLOATING PARTICLES (nebula dust)
// ====================================================================
function createParticles() {
 const count = 3000;
 const positions = new Float32Array(count * 3);
 const colors = new Float32Array(count * 3);
 
 for (let i = 0; i < count; i++) {
 positions[i*3] = (Math.random() - 0.5) * 1000;
 positions[i*3+1] = (Math.random() - 0.5) * 1000;
 positions[i*3+2] = (Math.random() - 0.5) * 1000;
 
 const hue = 0.6 + Math.random() * 0.3;
 const c = new THREE.Color().setHSL(hue, 0.6, 0.3 + Math.random() * 0.3);
 colors[i*3] = c.r;
 colors[i*3+1] = c.g;
 colors[i*3+2] = c.b;
 }
 
 const geo = new THREE.BufferGeometry();
 geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
 geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
 
 const mat = new THREE.PointsMaterial({
 size: 2,
 vertexColors: true,
 transparent: true,
 opacity: 0.4,
 blending: THREE.AdditiveBlending,
 sizeAttenuation: true,
 });
 
 const particleSystem = new THREE.Points(geo, mat);
 scene.add(particleSystem);
 return particleSystem;
}

const particleSystem = createParticles();

// ====================================================================
// FLOATING CARDS (job application cards in 3D space)
// ====================================================================
const cardTitles = [
 'NETWORK ENGINEER', 'DEVOPS ENGINEER', 'CLOUD ARCHITECT',
 'SECURITY ANALYST', 'SYSTEM ADMIN', 'IT MANAGER',
 'AI SCORER', 'COVER LETTER GEN', 'EMAIL SENDER',
 'DATA COLLECTOR', 'SWARM AGENT', 'MEGA SWARM',
 'ANTI-GRAVITY', 'ZERO G', 'SPACE DOCK',
 'CYBER DASHBOARD', 'QUANTUM SEARCH', 'NEURAL SCORE'
];

function createFloatingCard(x, y, z, title) {
 const width = 60;
 const height = 35;
 const depth = 2;
 
 // Card body
 const geo = new THREE.BoxGeometry(width, height, depth);
 const mat = new THREE.MeshPhongMaterial({
 color: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.7, 0.15),
 emissive: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.8, 0.05),
 emissiveIntensity: 0.3,
 transparent: true,
 opacity: 0.85,
 shininess: 60,
 side: THREE.DoubleSide,
 });
 const card = new THREE.Mesh(geo, mat);
 card.position.set(x, y, z);
 
 // Glow border
 const edgeGeo = new THREE.EdgesGeometry(geo);
 const edgeMat = new THREE.LineBasicMaterial({
 color: new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 1, 0.6),
 transparent: true,
 opacity: 0.6,
 });
 const edge = new THREE.LineSegments(edgeGeo, edgeMat);
 card.add(edge);
 
 // Add random rotation
 card.userData = {
 title: title || cardTitles[Math.floor(Math.random() * cardTitles.length)],
 velocity: new THREE.Vector3(
 (Math.random() - 0.5) * 0.5,
 (Math.random() - 0.5) * 0.5,
 (Math.random() - 0.5) * 0.5
 ),
 rotSpeed: (Math.random() - 0.5) * 0.02,
 floatOffset: Math.random() * Math.PI * 2,
 floatSpeed: 0.2 + Math.random() * 0.3,
 floatAmplitude: 2 + Math.random() * 5,
 mass: 0.5 + Math.random() * 1.5,
 createdAt: Date.now(),
 };
 
 scene.add(card);
 floatingCards.push(card);
 updateFloatingCount();
 return card;
}

// Spawn initial cards
for (let i = 0; i < 30; i++) {
 const theta = Math.random() * Math.PI * 2;
 const phi = Math.acos(2 * Math.random() - 1);
 const r = 80 + Math.random() * 150;
 createFloatingCard(
 r * Math.sin(phi) * Math.cos(theta),
 r * Math.sin(phi) * Math.sin(theta),
 r * Math.cos(phi)
 );
}

// ====================================================================
// TETHER LINES (connecting cards to center)
// ====================================================================
function createTethers() {
 const geo = new THREE.BufferGeometry();
 const positions = new Float32Array(floatingCards.length * 6);
 
 for (let i = 0; i < floatingCards.length; i++) {
 const p = floatingCards[i].position;
 positions[i*6] = p.x;
 positions[i*6+1] = p.y;
 positions[i*6+2] = p.z;
 positions[i*6+3] = 0;
 positions[i*6+4] = 0;
 positions[i*6+5] = 0;
 }
 
 geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
 
 const mat = new THREE.LineBasicMaterial({
 color: 0x00f0ff,
 transparent: true,
 opacity: 0.08,
 });
 
 const lines = new THREE.LineSegments(geo, mat);
 scene.add(lines);
 return lines;
}

let tethers = createTethers();

// ====================================================================
// FUNCTIONS
// ====================================================================

function updateFloatingCount() {
 state.floatingCount = floatingCards.length;
 document.getElementById('s-floating').textContent = state.floatingCount;
}

function toggleGravity() {
 state.antigravity = !state.antigravity;
 document.getElementById('btn-antigravity').classList.toggle('active');
 document.getElementById('btn-gravity').classList.toggle('active');
 document.getElementById('mode-title').textContent = state.antigravity ? 'ZERO G' : 'GRAVITY ON';
 
 // Flip all card velocities
 for (const card of floatingCards) {
 card.userData.velocity.y *= state.antigravity ? -1 : 1;
 card.userData.velocity.y += state.antigravity ? 0.5 : -0.5;
 }
}

function doBarrelRoll() {
 playSynthSound('roll');
 document.getElementById('mode-title').textContent = 'BARREL ROLL!';
 
 // Spin the entire scene 360 degrees around Z axis
 const startTime = Date.now();
 const duration = 1500;
 
 function animateRoll() {
 const elapsed = Date.now() - startTime;
 const progress = Math.min(elapsed / duration, 1);
 const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
 
 scene.rotation.z = eased * Math.PI * 2;
 
 if (progress < 1) {
 requestAnimationFrame(animateRoll);
 } else {
 scene.rotation.z = 0;
 document.getElementById('mode-title').textContent = state.antigravity ? 'ZERO G' : 'GRAVITY ON';
 }
 }
 
 animateRoll();
}

function spawnCard() {
 playSynthSound('spawn');
 const x = (Math.random() - 0.5) * 200;
 const y = (Math.random() - 0.5) * 200;
 const z = (Math.random() - 0.5) * 200;
 createFloatingCard(x, y, z);
 
 // Small burst at spawn point
 spawnMiniBurst(x, y, z);
}

function spawnBurst() {
 // Burst of particles from center
 for (let i = 0; i < 20; i++) {
 const theta = Math.random() * Math.PI * 2;
 const phi = Math.acos(2 * Math.random() - 1);
 const r = 20 + Math.random() * 30;
 setTimeout(() => {
 createFloatingCard(
 r * Math.sin(phi) * Math.cos(theta),
 r * Math.sin(phi) * Math.sin(theta),
 r * Math.cos(phi)
 );
 }, i * 50);
 }
}

function spawnMiniBurst(x, y, z) {
 const count = 10;
 const positions = new Float32Array(count * 3);
 const colors = new Float32Array(count * 3);
 
 for (let i = 0; i < count; i++) {
 positions[i*3] = x + (Math.random() - 0.5) * 20;
 positions[i*3+1] = y + (Math.random() - 0.5) * 20;
 positions[i*3+2] = z + (Math.random() - 0.5) * 20;
 const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.3, 1, 0.5);
 colors[i*3] = c.r;
 colors[i*3+1] = c.g;
 colors[i*3+2] = c.b;
 }
 
 const geo = new THREE.BufferGeometry();
 geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
 geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
 
 const mat = new THREE.PointsMaterial({
 size: 3,
 vertexColors: true,
 transparent: true,
 opacity: 0.8,
 blending: THREE.AdditiveBlending,
 sizeAttenuation: true,
 });
 
 const burst = new THREE.Points(geo, mat);
 scene.add(burst);
 
 // Fade out and remove
 const startTime = Date.now();
 function fadeBurst() {
 const elapsed = Date.now() - startTime;
 if (elapsed > 1000) {
 scene.remove(burst);
 geo.dispose();
 mat.dispose();
 return;
 }
 mat.opacity = 1 - elapsed / 1000;
 requestAnimationFrame(fadeBurst);
 }
 fadeBurst();
}

function resetScene() {
 // Remove all floating cards
 for (const card of floatingCards) {
 scene.remove(card);
 card.geometry.dispose();
 card.material.dispose();
 }
 floatingCards.length = 0;
 updateFloatingCount();
 
 // Respawn 20 cards
 for (let i = 0; i < 20; i++) {
 const theta = Math.random() * Math.PI * 2;
 const phi = Math.acos(2 * Math.random() - 1);
 const r = 50 + Math.random() * 100;
 setTimeout(() => {
 createFloatingCard(
 r * Math.sin(phi) * Math.cos(theta),
 r * Math.sin(phi) * Math.sin(theta),
 r * Math.cos(phi)
 );
 }, i * 30);
 }
 
 // Reset camera
 camera.position.set(0, 0, 300);
 camera.lookAt(0, 0, 0);
}

// ====================================================================
// MOUSE / TOUCH INTERACTION
// ====================================================================
document.addEventListener('mousemove', (e) => {
 state.mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
 state.mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
 
 if (state.isDragging) {
 const dx = e.clientX - state.prevMouse.x;
 const dy = e.clientY - state.prevMouse.y;
 state.rotationVelocity.x += dy * 0.005;
 state.rotationVelocity.y += dx * 0.005;
 state.prevMouse.x = e.clientX;
 state.prevMouse.y = e.clientY;
 }
});

document.addEventListener('mousedown', (e) => {
 state.isDragging = true;
 state.prevMouse.x = e.clientX;
 state.prevMouse.y = e.clientY;
});

document.addEventListener('mouseup', () => {
 state.isDragging = false;
});

document.addEventListener('wheel', (e) => {
 camera.position.z += e.deltaY * 0.3;
 camera.position.z = Math.max(80, Math.min(800, camera.position.z));
});

// Touch support
let touchStartX, touchStartY;
document.addEventListener('touchstart', (e) => {
 touchStartX = e.touches[0].clientX;
 touchStartY = e.touches[0].clientY;
 state.prevMouse.x = e.touches[0].clientX;
 state.prevMouse.y = e.touches[0].clientY;
 state.isDragging = true;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
 if (state.isDragging) {
 const dx = e.touches[0].clientX - state.prevMouse.x;
 const dy = e.touches[0].clientY - state.prevMouse.y;
 state.rotationVelocity.x += dy * 0.005;
 state.rotationVelocity.y += dx * 0.005;
 state.prevMouse.x = e.touches[0].clientX;
 state.prevMouse.y = e.touches[0].clientY;
 }
}, { passive: true });

document.addEventListener('touchend', () => {
 state.isDragging = false;
}, { passive: true });

// ====================================================================
// RESIZE
// ====================================================================
window.addEventListener('resize', () => {
 camera.aspect = window.innerWidth / window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
});

// ====================================================================
// ANIMATION LOOP
// ====================================================================
function animate() {
 requestAnimationFrame(animate);
 
 // Smooth mouse follow
 state.mouse.x += (state.mouse.targetX - state.mouse.x) * 0.05;
 state.mouse.y += (state.mouse.targetY - state.mouse.y) * 0.05;
 
 // Apply rotation velocity (damped)
 if (!state.isDragging) {
 state.rotationVelocity.x *= 0.95;
 state.rotationVelocity.y *= 0.95;
 }
 
 // Rotate scene group based on mouse/drag
 scene.rotation.x += state.rotationVelocity.x * 0.5;
 scene.rotation.y += state.rotationVelocity.y * 0.5;
 
 // Rotate starfield slowly
 starField.rotation.y += 0.0003;
 starField.rotation.x += 0.0001;
 
 // Animate particles
 particleSystem.rotation.y += 0.0005;
 particleSystem.rotation.z += 0.0002;
 
 // Glow sphere pulse
 glowSphere.scale.setScalar(1 + Math.sin(Date.now() * 0.001) * 0.2);
 
 // Update floating cards
 const now = Date.now();
 state.gForce = state.antigravity ? -0.02 : 0.05;
 document.getElementById('s-gforce').textContent = state.gForce.toFixed(1) + 'G';
 
 for (let i = floatingCards.length - 1; i >= 0; i--) {
 const card = floatingCards[i];
 const ud = card.userData;
 
 // Anti-gravity / gravity force
 if (state.antigravity) {
 ud.velocity.y += 0.008 * ud.mass; // Float up
 } else {
 ud.velocity.y -= 0.015 * ud.mass; // Fall down
 }
 
 // Damping
 ud.velocity.x *= 0.99;
 ud.velocity.y *= 0.99;
 ud.velocity.z *= 0.99;
 
 // Apply velocity
 card.position.x += ud.velocity.x;
 card.position.y += ud.velocity.y;
 card.position.z += ud.velocity.z;
 
 // Gentle floating oscillation
 card.position.y += Math.sin(now * 0.001 * ud.floatSpeed + ud.floatOffset) * 0.05;
 
 // Slow rotation
 card.rotation.x += ud.rotSpeed * 0.5;
 card.rotation.y += ud.rotSpeed;
 card.rotation.z += ud.rotSpeed * 0.3;
 
 // Keep within bounds
 const maxDist = 400;
 const dist = Math.sqrt(
 card.position.x ** 2 + card.position.y ** 2 + card.position.z ** 2
 );
 if (dist > maxDist) {
 // Pull back toward center
 ud.velocity.x -= card.position.x * 0.001;
 ud.velocity.y -= card.position.y * 0.001;
 ud.velocity.z -= card.position.z * 0.001;
 }
 
 // Click detection: if card is in center area and we click, launch it
 // (Handled by raycaster on click)
 }
 
 // Update tether lines
 updateTethers();
 
 // Increment cycle count periodically
 if (Math.random() < 0.001) {
 state.cycleCount++;
 document.getElementById('s-cycles').textContent = state.cycleCount;
 }
 
 renderer.render(scene, camera);
}

function updateTethers() {
 if (tethers) scene.remove(tethers);
 tethers = createTethers();
}

// ====================================================================
// CLICK TO LAUNCH CARD (raycaster)
// ====================================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
 mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
 mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
 
 raycaster.setFromCamera(mouse, camera);
 const intersects = raycaster.intersectObjects(floatingCards);
 
 if (intersects.length > 0) {
 const card = intersects[0].object;
 playSynthSound('launch');
 // Launch the card with velocity away from center
 const dir = card.position.clone().normalize();
 card.userData.velocity.x += dir.x * 3;
 card.userData.velocity.y += dir.y * 3 + 2;
 card.userData.velocity.z += dir.z * 3;
 
 // Spawn particles at click point
 spawnMiniBurst(card.position.x, card.position.y, card.position.z);
 } else {
 // Click on empty space -> spawn a card
 playSynthSound('spawn');
 const x = (e.clientX / window.innerWidth - 0.5) * 6;
 const y = -(e.clientY / window.innerHeight - 0.5) * 4;
 // Convert screen coords to 3D space
 const vec = new THREE.Vector3(x, y, -50);
 vec.unproject(camera);
 const dir2 = vec.sub(camera.position).normalize();
 const dist2 = -camera.position.z / dir2.z;
 const pos = camera.position.clone().add(dir2.multiplyScalar(dist2));
 
 createFloatingCard(pos.x + (Math.random()-0.5)*20, pos.y + (Math.random()-0.5)*20, pos.z + (Math.random()-0.5)*20);
 }
});

// ====================================================================
// LOADING COMPLETE
// ====================================================================
setTimeout(() => {
 document.getElementById('loading').classList.add('hidden');
}, 2000);

// Start animation
animate();

// ====================================================================
// AUTO-SPAWN every few seconds
// ====================================================================
setInterval(() => {
 if (floatingCards.length < 50) {
 const theta = Math.random() * Math.PI * 2;
 const phi = Math.acos(2 * Math.random() - 1);
 const r = 30 + Math.random() * 50;
 createFloatingCard(
 r * Math.sin(phi) * Math.cos(theta),
 r * Math.sin(phi) * Math.sin(theta),
 r * Math.cos(phi)
 );
 }
}, 3000);

// Fetch real stats from API
async function fetchStats() {
 try {
 const res = await fetch('/api/v2/stats');
 const data = await res.json();
 if (data.total_orders !== undefined) {
 document.getElementById('s-agents').textContent = (20000 + data.total_orders).toLocaleString();
 }
 } catch(e) {}
}
fetchStats();
setInterval(fetchStats, 30000);

console.log('=== ANTI-GRAVITY MODE ACTIVE ===');
console.log('20,000 agents floating in zero gravity');
console.log('Click cards to launch them into space!');
</script>
</body>
