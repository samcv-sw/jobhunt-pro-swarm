<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous AI Salary Negotiator | JobHunt Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --accent: #10b981;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --border-color: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-block-size: 100vh;
            padding-inline: 1.5rem;
            padding-block: 2rem;
            background-image: radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.18) 0%, transparent 45%),
                              radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 45%);
        }

        .container {
            max-inline-size: 1100px;
            margin-inline: auto;
        }

        .header {
            margin-block-end: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-block-start: 0.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-block-end: 1rem;
            color: #fde68a;
        }

        .form-group {
            margin-block-end: 1rem;
        }

        .form-group label {
            display: block;
            margin-block-end: 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            inline-size: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            dir: auto;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            inline-size: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-block-start: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.45);
        }

        .upside-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-block-end: 1rem;
        }

        .upside-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #34d399;
        }

        .letter-box {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 10px;
            padding: 1.2rem;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-block-end: 1rem;
            border: 1px solid var(--border-color);
        }

        .bullet-item {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-block-end: 0.5rem;
            border-inline-start: 3px solid var(--primary);
            font-size: 0.9rem;
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Autonomous AI Salary Negotiator</h1>
            <p>مساعد ذكي يولد خطابات ومحاور التفاوض على الرواتب بناءً على بيانات السوق واقتناص أفضل عرض</p>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h2>📋 تفاصيل العرض والهدف</h2>
                <form id="negForm">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="candidateName" class="form-control" value="سامي أحمد" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>المسمى الوظيفي</label>
                        <input type="text" id="jobTitle" class="form-control" value="Senior Backend Developer" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>اسم الشركة</label>
                        <input type="text" id="companyName" class="form-control" value="Enterprise Corp" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>العرض الحالي المعروض ($ USD / سنوياً)</label>
                        <input type="number" id="currentOffer" class="form-control" value="120000" required dir="auto">
                    </div>
                    <div class="form-group">
                        <label>الراتب المستهدف المطلوبة ($ USD / سنوياً)</label>
                        <input type="number" id="targetOffer" class="form-control" value="145000" required dir="auto">
                    </div>
                    <button type="submit" class="btn-submit">⚡ توليد خطة واستراتيجية التفاوض</button>
                </form>
            </div>

            <div class="card">
                <h2>📈 استراتيجية وخطاب التفاوض</h2>
                <div id="negResults">
                    <p style="color: var(--text-muted); text-align: center; margin-block-start: 4rem;">
                        قم بإدخال بيانات العرض واضغط على التزر للحصول على خطة التفاوض والخطاب المقترح.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('negForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const results = document.getElementById('negResults');
            results.innerHTML = '<p style="color: #fbbf24; text-align: center;">جاري بناء استراتيجية التفاوض وتحليل السوق...</p>';

            const payload = {
                candidate_name: document.getElementById('candidateName').value,
                job_title: document.getElementById('jobTitle').value,
                company_name: document.getElementById('companyName').value,
                current_offer_amount: parseFloat(document.getElementById('currentOffer').value),
                target_amount: parseFloat(document.getElementById('targetOffer').value),
                currency: "USD"
            };

            try {
                const res = await fetch('/api/v1/salary-negotiator/generate-counter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                let bulletsHtml = data.negotiation_script_bullets.map(b => `<div class="bullet-item">📌 ${b}</div>`).join('');

                results.innerHTML = `
                    <div class="upside-card">
                        <div>
                            <div style="color: var(--text-muted); font-size: 0.85rem;">الزيادة المستهدفة المتوقعة</div>
                            <div style="color: #fff; font-size: 0.95rem;">مستوى السوق: $${data.market_benchmark_median.toLocaleString()}</div>
                        </div>
                        <div class="upside-value">+$${data.potential_upside.toLocaleString()}</div>
                    </div>

                    <h4 style="font-size: 0.95rem; color: #fde68a; margin-block-end: 0.5rem;">خطاب المضادة المعياري (Counter-Offer Letter):</h4>
                    <div class="letter-box">${data.counter_offer_letter}</div>

                    <h4 style="font-size: 0.95rem; color: #fde68a; margin-block-end: 0.5rem;">محاور الحديث أثناء المكالمة (Call Script):</h4>
                    ${bulletsHtml}
                `;
            } catch (err) {
                results.innerHTML = '<p style="color: #ef4444; text-align: center;">حدث خطأ أثناء الاتصال بالخادم.</p>';
            }
        });
    </script>
</body>
</html>
