<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/favicon.png?v=3">
    <link rel="stylesheet" href="/static/css/cyberpunk-rtl.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="JobHunt Pro - Enterprise AI Job Application Automator">
    <meta name="theme-color" content="#3b82f6">
    <title>{% block title %}JobHunt Pro{% endblock %}</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ url_for('static', path='manifest.json') }}">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="preload" as="style" onload="this.rel='stylesheet'">
    
    <!-- Enterprise Glassmorphism CSS -->
    <link rel="stylesheet" href="/static/css/premium-ui.css">
    <link rel="stylesheet" href="/static/css/index-rtl.css">
    
    <!-- SEO JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "JobHunt Pro",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Any"
    }
    </script>
    {% block head %}{% endblock %}

  <style>
  /* CSS Logical Properties RTL direction variable */
  :root {
    --text-x-direction: 1; /* 1 for LTR, -1 for RTL */
  }
  [dir='rtl'] {
    --text-x-direction: -1;
  }
  </style></head>
<body class="cyberpunk-body">
    
    {% block content %}{% endblock %}

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/service-worker.js')
            .then(reg => console.log('Service Worker registered', reg))
            .catch(err => console.error('Service Worker registration failed', err));
        });
      }
    </script>

    <div id="particles-js" style="position:fixed; inset-block-start:0; inset-inline-start: 0; inline-size:100%; block-size:100%; z-index:-1; opacity:0.6; pointer-events:none;"></div>
    <!-- Cyberpunk UI Effects -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
    <script src="/static/js/cyberpunk.js" defer></script>
    
    <!-- Auto-Reconnect WebSocket Logic with HUD -->
    <script>
        function connectWebSocket() {
            if (window.location.pathname !== "/dashboard") return;
            
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/ws/live`;
            let ws = new WebSocket(wsUrl);
            let reconnectDelay = 1000; // Exponential backoff starting at 1s
            const hudStatus = document.getElementById('uplink-status');
            const hudText = document.getElementById('uplink-text');

            ws.onopen = function() {
                if(hudStatus) {
                    hudStatus.className = 'badge-pill bp-green';
                }
                if(hudText) {
                    hudText.innerText = 'UPLINK: SECURE';
                    hudText.className = 'badge-pill bp-green';
                }
                reconnectDelay = 1000;
            };

            ws.onmessage = function(event) {
                // Update dashboard UI dynamically here
                console.log("WS Data:", event.data);
            };

            ws.onclose = function(e) {
                if(hudStatus) {
                    hudStatus.className = 'badge-pill bp-red';
                }
                if(hudText) {
                    hudText.innerText = 'UPLINK SEVERED: RECONNECTING...';
                    hudText.className = 'badge-pill bp-red';
                }
                console.log(`Socket is closed. Reconnecting in ${reconnectDelay}ms...`, e.reason);
                setTimeout(function() {
                    reconnectDelay = Math.min(reconnectDelay * 2, 10000); // Max wait 10s
                    connectWebSocket();
                }, reconnectDelay);
            };

            ws.onerror = function(err) {
                console.error("Socket encountered error: ", err.message, "Closing socket");
                ws.close();
            };
        }
        
        connectWebSocket();
    </script>
    
    {% block scripts %}{% endblock %}
<script src="/static/js/global-animations.js" defer></script>
</body>
</html>
