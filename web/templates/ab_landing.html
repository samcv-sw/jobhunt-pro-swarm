<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHunt Pro - AI Mutating Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #080a0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            direction: rtl;
        }
        .hero {
            max-width: 800px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }
        p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }
        .cta-btn {
            background: #ffd700;
            color: #000;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            font-family: inherit;
        }
        .variant-badge {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 id="hero-headline">احصل على وظيفتك الأحلام تلقائياً بدقة 100% وبدون مجهود</h1>
        <p>المنظومة الأولى بالذكاء الاصطناعي التي تبحث، تجهز، وتقدم على آلاف الوظائف المناسبة لك بدقة متناهية</p>
        <button class="cta-btn" id="hero-cta">ابدأ التجربة المجانية الفورية 🚀</button>
        <div class="variant-badge">⚡ Real-time Variant: Gold_v2 (Genetic Optimization Engine Active)</div>
    </div>
</body>
</html>
