<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/static/css/cyberpunk.css">
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Reset Password - JobHunt Pro</title>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 background: #0a0a0f;
 color: #e0e0e0;
 font-family: 'Inter', sans-serif;
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 }
 .container {
 width: 100%;
 max-width: 400px;
 padding: 20px;
 }
 .card {
 background: rgba(20, 20, 30, 0.95);
 border: 1px solid rgba(0, 255, 136, 0.2);
 border-radius: 16px;
 padding: 40px;
 box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
 }
 .logo {
 font-family: 'Orbitron', sans-serif;
 font-size: 24px;
 color: #00ff88;
 text-align: center;
 margin-bottom: 30px;
 }
 h2 {
 text-align: center;
 color: #fff;
 margin-bottom: 10px;
 font-size: 20px;
 }
 .subtitle {
 text-align: center;
 color: #888;
 margin-bottom: 30px;
 font-size: 14px;
 }
 .form-group {
 margin-bottom: 20px;
 }
 label {
 display: block;
 color: #aaa;
 margin-bottom: 8px;
 font-size: 14px;
 }
 input[type="password"] {
 width: 100%;
 padding: 14px;
 background: rgba(255, 255, 255, 0.05);
 border: 1px solid rgba(255, 255, 255, 0.1);
 border-radius: 8px;
 color: #fff;
 font-size: 16px;
 transition: border-color 0.3s;
 }
 input:focus {
 outline: none;
 border-color: #00ff88;
 }
 .btn {
 width: 100%;
 padding: 14px;
 background: linear-gradient(135deg, #00ff88, #00cc6a);
 color: #000;
 border: none;
 border-radius: 8px;
 font-size: 16px;
 font-weight: 600;
 cursor: pointer;
 transition: transform 0.2s, box-shadow 0.2s;
 }
 .btn:hover {
 transform: translateY(-2px);
 box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
 }
 .links {
 text-align: center;
 margin-top: 20px;
 }
 .links a {
 color: #00ff88;
 text-decoration: none;
 font-size: 14px;
 }
 .links a:hover {
 text-decoration: underline;
 }
 .error {
 background: rgba(255, 50, 50, 0.1);
 border: 1px solid rgba(255, 50, 50, 0.3);
 color: #ff6b6b;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 20px;
 text-align: center;
 }
 </style>
</head>
<body class="cyberpunk-body">
 <div class="container">
 <div class="card">
 <div class="logo">&#x1F510; JobHunt Pro</div>
 <h2>Reset Password</h2>
 <p class="subtitle">Enter your new password</p>
 
 {% if error %}
 <div class="error">{{ error }}</div>
 {% endif %}
 
 <form method="POST" action="/reset-password">
 <input type="hidden" name="token" value="{{ token }}">
 <div class="form-group">
 <label>New Password</label>
 <input type="password" name="password" required placeholder="Enter new password" minlength="8">
 </div>
 <button type="submit" class="btn">Reset Password</button>
 </form>
 
 <div class="links">
 <a href="/login">&#x2190; Back to Login</a>
 </div>
 </div>
 </div>
</body>
</html>
