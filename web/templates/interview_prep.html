<style>
.prep-container {
    max-width: 800px;
    margin: 40px auto;
    background: #0f1115;
    border: 1px solid #1e2229;
    border-radius: 12px;
    padding: 30px;
    color: #e2e8f0;
}
.prep-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e2229;
    padding-bottom: 20px;
    margin-bottom: 30px;
}
.prep-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin: 0;
    color: #fff;
}
.prep-header .badge {
    background: rgba(99, 102, 241, 0.1);
    color: #818cf8;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    border: 1px solid rgba(99, 102, 241, 0.2);
}
.prep-content {
    line-height: 1.7;
    font-size: 1.05rem;
}
.prep-content h2, .prep-content h3 {
    color: #fff;
    margin-top: 25px;
    margin-bottom: 15px;
}
.prep-content ul, .prep-content ol {
    padding-inline-start: 20px;
}
.prep-content li {
    margin-bottom: 10px;
}
.prep-content strong {
    color: #818cf8;
}
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #94a3b8;
    text-decoration: none;
    margin-bottom: 20px;
    font-weight: 500;
    transition: color 0.2s;
}
.back-btn:hover {
    color: #fff;
}
</style>
