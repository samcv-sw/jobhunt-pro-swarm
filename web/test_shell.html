<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard &#x2014; JobHunt Pro</title>
    <link rel="stylesheet" href="/static/css/cyberpunk.css?v=199">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
        :root{
          --bg:#0a0a14;--surface:#0d0d1a;--surface-hover:#111122;
          --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.1);
          --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
          --blue:#3b82f6;--green:#22c55e;--gold:#f59e0b;
          --purple:#8b5cf6;--red:#ef4444;--pink:#f472b6;
          --radius:10px;--radius-lg:14px;--shadow:0 4px 20px rgba(0,0,0,.3);
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 !important;margin:0 !important;}
        .sidebar{width:180px;background:#080812;border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;z-index:1000000;display:flex;flex-direction:column;}
        .sidebar .logo{font-size:20px;font-weight:800;padding:24px 16px 12px;color:#3b82f6;letter-spacing:-0.5px;flex-shrink:0;line-height:1;}
        .sidebar .logo span{color:#fff;font-size:20px;font-weight:800;letter-spacing:-0.5px;}
        .sidebar nav{flex:1;display:flex;flex-direction:column;padding:8px 8px 16px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
        .sidebar nav::-webkit-scrollbar{width:3px;}
        .sidebar nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}
        .sidebar nav a{padding:10px 10px;margin-bottom:4px;color:#71717a;text-decoration:none;font-size:14px;transition:all .15s;border-radius:8px;display:flex;align-items:center;gap:10px;flex-shrink:0;line-height:1.3;}
        .sidebar nav a .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;line-height:1;}
        .sidebar nav a:hover{color:#d4d4d8;background:rgba(255,255,255,.03);}
        .sidebar nav a.active{color:#3b82f6;background:rgba(59,130,246,.1);font-weight:600;}
        .sidebar nav a.logout{color:#ef4444;margin-top:auto;}
        .sidebar nav a.logout:hover{background:rgba(239,68,68,.08);}
        .sidebar nav .nav-divider{flex-shrink:0;height:1px;background:rgba(255,255,255,.04);margin:8px 4px;}
        .main{margin-left:180px;padding:16px 16px 0;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;}
        .main-content-wrapper{flex:1;}
        .footer{margin-top:auto;padding:24px 0;text-align:center;color:var(--text-muted);font-size:13px;border-top:1px solid var(--border);}
        .main h1{font-size:32px;font-weight:800;margin-bottom:8px;}
        .main .subtitle{color:#64748b;margin-bottom:32px;font-size:16px;}

        /* Welcome Card */
        .welcome-card{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(139,92,246,.04));border:1px solid rgba(59,130,246,.15);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;}
        .welcome-card h1{font-size:20px;margin-bottom:8px;background:linear-gradient(90deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .balance-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:8px;}
        .bal-block{display:flex;flex-direction:column;gap:2px;}
        .bal-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
        .bal-value{font-size:24px;font-weight:800;color:var(--green);letter-spacing:-.5px;}

        /* Streak Card */
        .streak-card{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.12);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:12px;}
        .streak-dots{display:flex;gap:6px;align-items:center;}
        .streak-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s;}

        /* Upgrade Card */
        .upgrade-card{background:linear-gradient(135deg,rgba(245,158,11,.04),rgba(239,68,68,.02));border:1px solid rgba(245,158,11,.1);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
        .upgrade-icon{font-size:28px;flex-shrink:0;}
        .upgrade-body{flex:1;min-width:200px;}
        .upgrade-title{font-weight:700;font-size:15px;color:var(--gold);margin-bottom:4px;}
        .upgrade-sub{font-size:12px;color:var(--text-dim);line-height:1.6;}

        /* Flash Sale */
        .flash-card{background:linear-gradient(135deg,rgba(239,68,68,.06),rgba(239,68,68,.02));border:1px solid rgba(239,68,68,.12);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:12px;}
        .flash-label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);font-weight:700;}
        .flash-title{font-size:15px;font-weight:700;margin:6px 0;}
        .flash-off{font-size:13px;color:var(--text-dim);}
        .flash-timer{font-family:monospace;font-size:20px;font-weight:700;color:var(--red);margin:8px 0;letter-spacing:1px;}

        /* Card containers */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;transition:all .2s;}
        .card:hover{border-color:var(--border-hover);}
        .card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:var(--text);}

        /* Campaign Performance Stats Grid (4 columns) */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
        .stat-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;text-align:center;transition:all .2s;}
        .stat-box:hover{background:rgba(255,255,255,.05);border-color:var(--border-hover);transform:translateY(-1px);}
        .stat-num{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;line-height:1.2;}
        .stat-lbl{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

        /* Pipeline Bar */
        .pipe-bar{display:flex;border-radius:8px;overflow:hidden;height:32px;margin-bottom:16px;}
        .pipe-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:all .2s;position:relative;gap:6px;}
        .pipe-seg:hover{filter:brightness(1.15);}
        .seg-disc{background:linear-gradient(135deg,#3b82f6,#6366f1);}
        .seg-appl{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
        .seg-fup{background:linear-gradient(135deg,#f59e0b,#f97316);}
        .seg-intv{background:linear-gradient(135deg,#22c55e,#16a34a);}
        .seg-offr{background:linear-gradient(135deg,#8b5cf6,#a855f7);}

        /* Deliverability Section (FIXED: distinct colored badges) */
        .deliv-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
        .deliv-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .deliv-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
        .deliv-score{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-.5px;}
        .deliv-bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-bottom:8px;}
        .deliv-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e,#8b5cf6);border-radius:3px;transition:width .6s ease;}
        .deliv-labels{display:flex;justify-content:space-between;gap:6px;}
        .deliv-label{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
        .deliv-label.lbl-poor{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2);}
        .deliv-label.lbl-average{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2);}
        .deliv-label.lbl-good{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.2);}
        .deliv-label.lbl-excellent{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2);}

        /* Mini Stats (bottom row) */
        .mini-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
        .mini-stats .stat-box{padding:16px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-align:center;transition:all .2s;}
        .mini-stats .stat-box:hover{background:var(--surface-hover);border-color:var(--border-hover);transform:translateY(-1px);}
        .mini-stats .stat-num{font-size:22px;font-weight:800;margin-bottom:2px;}
        .mini-stats .stat-lbl{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.3px;}

        /* Pipeline Stages */
        .section-hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
        .section-hdr h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
        .pipe-stages{display:flex;align-items:center;gap:0;margin-bottom:20px;flex-wrap:wrap;}
        .pipe-stage-box{flex:1;min-width:60px;padding:14px 10px;border-radius:var(--radius);border:1px solid;text-align:center;transition:all .2s;}
        .pipe-stage-box:hover{transform:translateY(-2px);}
        .psb-num{font-size:26px;font-weight:800;line-height:1.2;}
        .psb-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
        .pipe-arrow{font-size:18px;color:var(--text-muted);padding:0 6px;font-weight:300;}

        /* Tables */
        .table-wrapper{overflow-x:auto;margin-top:12px;}
        .table{width:100%;border-collapse:collapse;font-size:13px;}
        .table th{text-align:left;padding:10px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
        .table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.03);}
        .table tr:hover td{background:rgba(255,255,255,.02);}
        .badge-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
        .s-completed{background:rgba(34,197,94,.12);color:#4ade80;}
        .s-failed{background:rgba(239,68,68,.12);color:#ef4444;}
        .s-running{background:rgba(59,130,246,.12);color:#60a5fa;}
        .s-paused{background:rgba(245,158,11,.12);color:#fbbf24;}
        .ps-discovered{background:rgba(59,130,246,.12);color:#60a5fa;}
        .ps-applied{background:rgba(99,102,241,.12);color:#818cf8;}
        .ps-followed_up{background:rgba(245,158,11,.12);color:#fbbf24;}
        .ps-interview{background:rgba(34,197,94,.12);color:#4ade80;}
        .ps-offer{background:rgba(139,92,246,.12);color:#a78bfa;}

        /* Email Card */
        .email-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;}
        .email-card .section-hdr{margin-bottom:12px;}
        .form-group{margin-bottom:14px;}
        .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
        .form-group input,.form-group textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--blue);background:rgba(59,130,246,.04);}
        .form-group textarea{min-height:100px;resize:vertical;}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

        /* Referral */
        .referral-card{background:linear-gradient(135deg,rgba(139,92,246,.04),rgba(59,130,246,.02));border:1px solid rgba(139,92,246,.1);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;}
        .referral-card h3{font-size:17px;font-weight:700;margin-bottom:4px;}
        .referral-card p{font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
        .ref-link-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-family:monospace;font-size:12px;color:var(--text-dim);word-break:break-all;margin-bottom:10px;}

        /* Alerts & Utilities */
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}
        .empty-state p{font-size:14px;margin-bottom:16px;}
        .alert-ok{padding:12px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);border-radius:var(--radius);color:#4ade80;font-size:13px;font-weight:600;margin-bottom:16px;}
        .alert-err{padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:var(--radius);color:#ef4444;font-size:13px;font-weight:600;margin-bottom:16px;}
        .toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;background:#080812;border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--text);font-size:13px;z-index:9999;opacity:0;transform:translateY(20px);transition:all .4s;pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,.4);}
        .toast.show{opacity:1;transform:translateY(0);pointer-events:auto;}
        .toast.error{border-color:rgba(239,68,68,.3);}
        .toast.info{border-color:rgba(59,130,246,.3);}

        /* Buttons */
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;font-family:'Inter',sans-serif;}
        .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.25);}
        .btn-sm{padding:6px 12px;font-size:12px;}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
        .btn-outline:hover{background:rgba(255,255,255,.04);}
        .btn-purple{background:linear-gradient(135deg,#8b5cf6,#a855f7);}
        .btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);}
        .btn-orange{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
        .btn-ai{background:linear-gradient(135deg,#00f0ff,#00a0cc);color:#000;font-weight:700;}

        /* Responsive */
        @media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:768px){
          .stats-grid{grid-template-columns:1fr 1fr;}
          .mini-stats{grid-template-columns:repeat(2,1fr);}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border);}
          .main{margin-left:0;padding:12px;width:100%;max-width:100vw;}
          .pipe-stages{flex-wrap:wrap;gap:8px;}
          .pipe-stage-box{min-width:calc(33% - 8px);}
          .pipe-arrow{display:none;}
          .row{grid-template-columns:1fr;}
          .card{padding:16px;}
          .stat-num{font-size:22px;}
        }
        @media(max-width:480px){
          .stats-grid{grid-template-columns:1fr}
          .mini-stats{grid-template-columns:1fr 1fr}
        }

        /* Referral Page */
        .page-header{margin-bottom:20px;}
        .page-header h1{font-size:24px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
        .ref-hero{background:linear-gradient(135deg,rgba(59,130,246,.04),rgba(139,92,246,.04));border:1px solid rgba(59,130,246,.1);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;text-align:center;}
        .ref-hero h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:4px;}
        .big-num{font-size:48px;font-weight:800;letter-spacing:-1px;color:var(--blue);line-height:1;margin-bottom:2px;}
        .big-num span{font-size:16px;font-weight:400;color:var(--text-dim);letter-spacing:0;}
        .link-row{display:flex;gap:8px;max-width:500px;margin:14px auto 4px;}
        .link-row input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:monospace;outline:none;}
        .link-row input:focus{border-color:var(--blue);}
        .btn-copy{padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
        .btn-copy:hover{filter:brightness(1.15);}
        .share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
        .share-wa,.share-tw,.share-dc{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer;}
        .share-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);color:#25d366;}
        .share-wa:hover{background:rgba(37,211,102,.18);}
        .share-tw{background:rgba(29,161,242,.1);border:1px solid rgba(29,161,242,.2);color:#1da1f2;}
        .share-tw:hover{background:rgba(29,161,242,.18);}
        .share-dc{background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.2);color:#5865f2;}
        .share-dc:hover{background:rgba(88,101,242,.18);}
        .mt-3{margin-top:24px;}
        .mb-2{margin-bottom:16px;}
        .steps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
        .step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;transition:all .2s;}
        .step:hover{border-color:var(--border-hover);transform:translateY(-2px);}
        .step-num{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin:0 auto 10px;}
        .step h4{font-size:14px;font-weight:700;margin-bottom:4px;}
        .step p{font-size:12px;color:var(--text-dim);line-height:1.5;}
        .copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 24px;background:#22c55e;color:#fff;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;}
        .copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .empty-icon{font-size:32px;margin-bottom:8px;}
        .empty-text{font-size:14px;color:var(--text-dim);}
        @media(max-width:768px){.steps-row{grid-template-columns:1fr;}.ref-hero{padding:18px;}.big-num{font-size:36px;}.share-btns{flex-direction:column;align-items:center;}.share-btns a{width:100%;justify-content:center;}.link-row{flex-direction:column;}}
        </style>
</head>
