<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobHunt Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 420px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a14;
      color: #e2e8f0;
      overflow-x: hidden;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 20px 20px 16px;
      text-align: center;
    }
    .header .logo {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .header .logo span {
      opacity: 0.7;
      font-weight: 500;
      font-size: 10px;
      display: block;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .content { padding: 16px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: #f8fafc;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .stat-card.success .stat-value { color: #10b981; }
    .stat-card.primary .stat-value { color: #3b82f6; }
    .stat-card.warning .stat-value { color: #f59e0b; }

    .action-section {
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      margin-bottom: 8px;
    }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #94a3b8;
      font-size: 12px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .profile-status {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }
    .profile-status .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active { background: #10b981; }
    .status-dot.inactive { background: #ef4444; }

    .recent-activity {
      margin-top: 12px;
    }
    .recent-activity h3 {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 11px;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .activity-icon.fill { background: rgba(59,130,246,0.15); }
    .activity-info { flex: 1; min-width: 0; }
    .activity-company { font-weight: 600; color: #d4d4d8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-time { color: #52525b; font-size: 10px; margin-top: 1px; }
    .empty-state {
      text-align: center;
      padding: 20px 0;
      color: #52525b;
      font-size: 12px;
    }
    .footer {
      padding: 10px 16px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer a {
      color: #52525b;
      font-size: 11px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">JobHunt<span>Pro</span></div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card primary">
        <div class="stat-value" id="stat-today">-</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-total">-</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card success">
        <div class="stat-value" id="stat-rate">-</div>
        <div class="stat-label">Success</div>
      </div>
    </div>

    <!-- Profile Status -->
    <div class="profile-status" id="profile-status">
      <span class="status-dot inactive"></span>
      <span id="profile-text">No profile set — configure first</span>
    </div>

    <!-- Actions -->
    <div class="action-section">
      <button class="btn btn-primary" id="btn-configure">⚙️ Configure Profile</button>
      <button class="btn btn-secondary" id="btn-open-dashboard">📊 Open Dashboard →</button>
    </div>

    <!-- Recent Activity -->
    <div class="recent-activity">
      <h3>Recent Activity</h3>
      <div id="activity-list">
        <div class="empty-state">No applications yet</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://jhfguf.pythonanywhere.com" target="_blank">jhfguf.pythonanywhere.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
