# ============================================
# JobHunt Pro - Fly.io Configuration
# ============================================

app = "jobhunt-pro-cloud"
primary_region = "ams"  # Amsterdam — closest available to Lebanon/GCC

[build]
  dockerfile = "Dockerfile.cloud"

[env]
  PORT = "8000"
  MAX_WORKERS = "100"
  DAILY_SEND_LIMIT = "2000"
  DRY_RUN = "false"
  CV_PATH = "assets/Sam_Salameh_CV.pdf"
  # DATABASE_URL = ""  # -> Set via `fly secrets set DATABASE_URL=postgresql+asyncpg://...`
  # DATABASE_URL_SYNC = "" # -> Set via `fly secrets set DATABASE_URL_SYNC=postgresql://...`
  # Brevo (REST API fallback) — set via `fly secrets set BREVO_API_KEY=... BREVO_ACCOUNT_EMAIL=...`
  # BREVO_API_KEY = ""
  # BREVO_ACCOUNT_EMAIL = ""

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "10s"
    type = "http"
