name: PA Auto-Renew Monthly
on:
  schedule:
    # Run on the 10th and 25th of every month to keep account alive
    - cron: '0 10 10,25 * *'
  workflow_dispatch:  # Manual trigger

jobs:
  autorenew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests pyotp
      - name: Extend PythonAnywhere account
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME || 'jhfguf' }}
          PA_PASSWORD: ${{ secrets.PA_PASSWORD }}
          PA_TOTP_SECRET: ${{ secrets.PA_TOTP_SECRET }}
        run: |
          python .github/pa_autorenew.py
