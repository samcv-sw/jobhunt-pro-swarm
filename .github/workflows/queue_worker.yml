name: "Infinite Worker (Microsoft Azure)"

on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: queue-worker
  cancel-in-progress: false

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Force kill after 5 minutes to prevent billing overages

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Pip Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Queue Worker (270s timeout)
        env:
          NEON_URL: ${{ secrets.NEON_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          # We run the worker with a 270 second (4.5 min) timeout so it ends gracefully before the next cron tick
          timeout 270s python core/queue_worker.py || true
          echo "Worker cycle complete."
