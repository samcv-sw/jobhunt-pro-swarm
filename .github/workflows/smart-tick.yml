name: JobHunt Pro — Smart Cloud Tick & Dispatcher
on:
  schedule:
    # Run every 20 minutes (72 runs/day, ~2,160 runs/month - safe for private repo 2k min limit)
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      force_mode:
        description: 'Force mode (normal/heal/hyper)'
        required: false
        default: 'normal'

env:
  WORKER_URL: 'https://jobhunt-pro-router.samsalameh-cv.workers.dev'
  PA_URL: 'https://jhfguf.pythonanywhere.com'

jobs:
  cloud-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
        continue-on-error: true

      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4 aiosmtplib --quiet
        continue-on-error: true

      - name: 1️⃣ Tick & Keep-Alive All Backends
        id: pa-tick
        continue-on-error: true
        run: |
          echo "=== CLOUD TICK v3 ==="
          BACKENDS=(
            "https://jhfguf.pythonanywhere.com"
            "https://jobhunt-pro.fly.dev"
            "https://jobhunt-pro.onrender.com"
          )
          for backend in "${BACKENDS[@]}"; do
            echo "Pinging backend: ${backend}"
            RESPONSE=$(curl -s --max-time 120 \
              -X POST "${backend}/api/v2/cloud-tick" \
              -H "Content-Type: application/json" \
              -d '{"action":"cloud_tick","source":"gh-actions-dispatcher"}' || echo "failed")
            echo "Response: $RESPONSE"
            
            echo "Resetting stuck campaigns on backend: ${backend}"
            RESET_RESP=$(curl -s --max-time 30 \
              -X POST "${backend}/api/v2/cloud-tick/reset-stuck" \
              -H "Content-Type: application/json" || echo "failed")
            echo "Reset Response: $RESET_RESP"
          done

      - name: 2️⃣ Check PA Webapp Health & Auto-Reload
        id: pa-health
        continue-on-error: true
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN || secrets.PA_TOKEN }}
          PA_USER: ${{ vars.PA_USER || 'jhfguf' }}
          PA_DOMAIN: ${{ vars.PA_DOMAIN || 'jhfguf.pythonanywhere.com' }}
        run: |
          CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "https://${PA_DOMAIN}/api/ping" || echo "500")
          echo "PA ping HTTP code: $CODE"
          if [ "$CODE" != "200" ] && [ ! -z "$PA_TOKEN" ]; then
            echo "PA is unhealthy. Re-triggering webapp reload..."
            curl -s --max-time 20 -X POST \
              "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/webapps/${PA_DOMAIN}/reload/" \
              -H "Authorization: Token ${PA_TOKEN}"
          fi

      - name: 3️⃣ Process D1 Email Outbox Queue
        id: process-emails
        continue-on-error: true
        env:
          OUTBOX_SECRET: ${{ secrets.OUTBOX_SECRET }}
        run: |
          echo "=== Processing Outbox SMTP Queue ==="
          python scripts/cloud_email_sender.py

      - name: 4️⃣ Process Telegram Bot Swarm Queue (One-Shot)
        id: process-queue
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== Processing Telegram Swarm Queue ==="
          python cloud_queue_worker.py --one-shot

      - name: 5️⃣ Monitor Cloudflare Worker Health
        id: cf-health
        continue-on-error: true
        run: |
          CF_CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "${{ env.WORKER_URL }}/api/cloud-health" || echo "500")
          echo "Cloudflare Worker status code: $CF_CODE"
          if [ "$CF_CODE" != "200" ]; then
            echo "cf_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚨 Send Telegram Alerts on Failure
        if: ${{ steps.cf-health.outputs.cf_failed == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            msg="🚨 CLOUD CRITICAL ALERT: Cloudflare Worker API is down! Health status code returned non-200. Please inspect wrangler logs."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${msg}"
          else
            echo "⚠️ Telegram bot details not configured, skipping alert."
          fi
