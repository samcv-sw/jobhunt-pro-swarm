name: Smart Tick (Consolidated)

on:
  schedule:
    - cron: '*/4 * * * *'   # Every 4 minutes
  workflow_dispatch:
    inputs:
      force_mode:
        description: 'Mode (normal/heal/hyper)'
        required: false
        default: 'normal'
      company_limit:
        description: 'Companies per tenant per tick'
        required: false
        default: '3'

jobs:
  smart-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5            # 250s PA free tier limit fits in 5 min
    steps:
      # ── Step 1: Cloud Tick with smart retry & multi-node fallback ──
      - name: Cloud Tick (POST /api/v2/cloud-tick)
        id: tick
        continue-on-error: true
        run: |
          echo "=== SMART TICK (MULTI-NODE HYDRA) ==="
          BACKENDS=(
            "https://jhfguf.pythonanywhere.com"
            "https://jobhunt-pro.fly.dev"
            "https://jobhunt-pro.zeabur.app"
            "https://jobhunt-pro.onrender.com"
          )
          
          TICK_OK=false
          PA_FAILED=false
          
          for backend in "${BACKENDS[@]}"; do
            echo "Trying cloud-tick on backend: $backend..."
            ATTEMPT=0
            MAX_ATTEMPTS=2
            DELAY=5
            
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$TICK_OK" = false ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "  [$(date -u +%T)] Attempt $ATTEMPT/$MAX_ATTEMPTS on $backend..."
              
              RESPONSE=$(curl -s --max-time 120 \
                -X POST "$backend/api/v2/cloud-tick" \
                -H "Content-Type: application/json" \
                -d "{\"action\":\"cloud_tick\",\"source\":\"gh-actions\",\"company_limit\":${{ github.event.inputs.company_limit || '3' }},\"mode\":\"${{ github.event.inputs.force_mode || 'normal' }}\"}")
              
              echo "  Response: $RESPONSE"
              
              STATUS=$(echo "$RESPONSE" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(d.get('status', 'error'))
except:
    print('parse_error')
" 2>/dev/null || echo "parse_error")
              
              echo "  Parsed status: $STATUS"
              
              if [ "$STATUS" = "ok" ]; then
                echo "✓ Tick successful on $backend!"
                TICK_OK=true
                echo "tick_status=ok" >> $GITHUB_OUTPUT
                echo "active_backend=$backend" >> $GITHUB_OUTPUT
                echo "tick_response=$RESPONSE" >> $GITHUB_OUTPUT
                break 2
              fi
              
              echo "✗ Attempt $ATTEMPT failed on $backend"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                sleep $DELAY
              fi
            done
            
            if [ "$backend" = "https://jhfguf.pythonanywhere.com" ] && [ "$TICK_OK" = false ]; then
              PA_FAILED=true
            fi
            echo "Backend $backend failed, moving to next fallback..."
          done
          
          if [ "$PA_FAILED" = true ]; then
            echo "pa_failed=true" >> $GITHUB_OUTPUT
          else
            echo "pa_failed=false" >> $GITHUB_OUTPUT
          fi
          
          if [ "$TICK_OK" = false ]; then
            echo "tick_status=failed" >> $GITHUB_OUTPUT
            echo "::error::All Hydra backends failed to tick!"
            exit 1
          fi

      # ── Step 2: Health check after tick ──
      - name: Health Check
        id: health
        continue-on-error: true
        run: |
          echo "=== HEALTH CHECK ==="
          CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://jhfguf.pythonanywhere.com/api/ping")
          echo "PA ping HTTP: $CODE"
          echo "pa_code=$CODE" >> $GITHUB_OUTPUT

          if [ "$CODE" = "200" ]; then
            echo "✓ PA healthy"
          else
            echo "✗ PA unhealthy (code: $CODE)"
          fi

      # ── Step 3: Reload PA only on failure ──
      - name: Reload PA (Primary Recovery)
        id: reload
        if: |
          (steps.tick.outputs.pa_failed == 'true' || steps.health.outputs.pa_code != '200')
        continue-on-error: true
        run: |
          echo "=== PA RELOAD TRIGGERED ==="
          echo "Primary PythonAnywhere node is unhealthy or failed to tick. Reloading PA..."

          RELOAD_RESPONSE=$(curl -s --max-time 30 -X POST \
            "https://www.pythonanywhere.com/api/v0/user/JHFGUF/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}")

          echo "Reload response: $RELOAD_RESPONSE"
          echo "reload_status=triggered" >> $GITHUB_OUTPUT

      # ── Step 4: Telegram alert only on CRITICAL failure ──
      - name: Telegram Alert (Critical)
        if: |
          always() &&
          (steps.tick.outputs.tick_status != 'ok' || steps.reload.outcome == 'failure')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== CRITICAL ALERT ==="

          TICK_ST="${{ steps.tick.outputs.tick_status || 'failed' }}"
          PA_CODE="${{ steps.health.outputs.pa_code || 'unknown' }}"
          ACTIVE_B="${{ steps.tick.outputs.active_backend || 'none' }}"

          # Only alert if the entire tick failed, or PA reload failed while PA was down
          if [ "$TICK_ST" != "ok" ] || [ "${{ steps.reload.outcome }}" = "failure" ]; then
            MSG="🚨 SMART TICK CRITICAL ALERT: tick_status=${TICK_ST}, active_backend=${ACTIVE_B}, pa_http=${PA_CODE}"
            curl -s --max-time 10 -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=6639482672" \
              -d "text=${MSG}"
          fi
