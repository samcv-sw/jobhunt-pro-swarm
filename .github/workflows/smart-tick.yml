name: JobHunt Pro — Worker Tick (Always-On Queue Processor)
on:
  schedule:
    # Run every 5 minutes (288 runs/day, ~8,640 runs/month)
    # GitHub Actions gives 2,000 min/month free for private repos
    # BUT: public repos get UNLIMITED minutes!
    # Make the repo PUBLIC to get unlimited cron execution.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_tick:
        description: 'Force worker tick'
        required: false
        default: 'true'

env:
  PA_URL: 'https://jhfguf.pythonanywhere.com'

jobs:
  worker-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 1️⃣ Worker Tick - Process Queue Items
        id: worker-tick
        continue-on-error: true
        run: |
          echo "=== WORKER TICK v17.1 ==="
          echo "Tick time: $(date -u)"
          
          # Call the PA Always-On Worker endpoint
          # This processes 1-2 queue items per tick (fits within PA's ~60s timeout)
          RESPONSE=$(curl -s --max-time 300 \
            -X POST "${PA_URL}/api/v2/worker/tick" \
            -H "Content-Type: application/json" \
            -d '{"source":"gh-actions-cron"}' || echo '{"processed":0,"errors":["curl_failed"]}')
          
          echo "Response: $RESPONSE"
          
          # Check if more ticks are needed
          NEEDS_MORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('next_tick_needed', False))" 2>/dev/null || echo "false")
          PROCESSED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed', 0))" 2>/dev/null || echo "0")
          ERRORS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('errors', [])))" 2>/dev/null || echo "0")
          
          echo "processed=$PROCESSED" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "needs_more=$NEEDS_MORE" >> $GITHUB_OUTPUT
          
          echo "=== Tick Complete: processed=$PROCESSED, errors=$ERRORS, needs_more=$NEEDS_MORE ==="

      - name: 2️⃣ Check PA Health & Auto-Reload
        id: pa-health
        continue-on-error: true
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN || secrets.PA_TOKEN }}
          PA_USER: ${{ vars.PA_USER || 'jhfguf' }}
          PA_DOMAIN: ${{ vars.PA_DOMAIN || 'jhfguf.pythonanywhere.com' }}
        run: |
          CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "https://${PA_DOMAIN}/api/v2/health" || echo "500")
          echo "PA health HTTP code: $CODE"
          if [ "$CODE" != "200" ] && [ ! -z "$PA_TOKEN" ]; then
            echo "PA is unhealthy. Re-triggering webapp reload..."
            curl -s --max-time 20 -X POST \
              "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/webapps/${PA_DOMAIN}/reload/" \
              -H "Authorization: Token ${PA_TOKEN}"
          fi

      - name: 3️⃣ Check Queue Depth & Alert if Growing
        id: queue-check
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HEALTH=$(curl -s --max-time 15 "${PA_URL}/api/v2/health" || echo '{"queue":{"pending":0,"running":0}}')
          PENDING=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('queue',{}).get('pending',0))" 2>/dev/null || echo "0")
          RUNNING=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('queue',{}).get('running',0))" 2>/dev/null || echo "0")
          
          echo "Queue: pending=$PENDING, running=$RUNNING"
          
          # Alert if queue is growing (more than 5 pending)
          if [ "$PENDING" -gt 5 ] && [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            msg="⚠️ QUEUE BACKLOG: $PENDING pending tasks on PA. Consider increasing tick frequency."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${msg}"
          fi
