name: Mega Tick (Multi-Tenant Maximum)
on:
  schedule:
    - cron: '*/3 * * * *'  # Every 3 minutes
  workflow_dispatch:
    inputs:
      company_limit:
        description: 'Companies per tenant per tick'
        required: false
        default: '10'

jobs:
  mega-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Multi-Tenant Cloud Tick
        id: tick
        continue-on-error: true
        run: |
          echo "=== MEGA TICK v17 MULTI-TENANT ==="
          ATTEMPT=0
          MAX_ATTEMPTS=3
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT+1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
            RESPONSE=$(curl -s --max-time 240 \
              -X POST "https://jhfguf.pythonanywhere.com/api/v2/cloud-tick" \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"mega_tick\",\"source\":\"gh-actions-mega\",\"company_limit\":${{ github.event.inputs.company_limit || '10' }}}")
            echo "Response: $RESPONSE"
            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" 2>/dev/null || echo "parse_error")
            if [ "$STATUS" = "ok" ]; then
              echo "Tick successful!"
              echo "tick_status=ok" >> $GITHUB_OUTPUT
              echo "tick_response=$RESPONSE" >> $GITHUB_OUTPUT
              break
            fi
            echo "Tick attempt $ATTEMPT failed (status: $STATUS). Waiting $((ATTEMPT*10))s..."
            sleep $((ATTEMPT*10))
          done

      - name: Check PA Health
        id: health
        continue-on-error: true
        run: |
          CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://jhfguf.pythonanywhere.com/api/ping")
          echo "PA ping: $CODE"
          echo "pa_code=$CODE" >> $GITHUB_OUTPUT

      - name: Reload PA if unhealthy
        if: steps.health.outputs.pa_code != '200'
        run: |
          echo "PA unhealthy (${{ steps.health.outputs.pa_code }}). Reloading..."
          curl -s --max-time 30 -X POST \
            "https://www.pythonanywhere.com/api/v0/user/JHFGUF/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"

      - name: Telegram Notification
        if: always()
        run: |
          STATUS_MSG="MEGA TICK: ${{ steps.tick.outputs.tick_status || 'failed' }}"
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6639482672" \
            -d "text=$STATUS_MSG"
