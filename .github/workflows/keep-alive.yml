name: ⚡ Render Keep-Alive (Zero Cost Uptime)

# Render's free tier spins down instances after 15 minutes of inactivity.
# This workflow pings your application every 10 minutes so it stays awake 24/7.
# Result: 0 Investment, Permanent Uptime.

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Application
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          # Use secret URL or fall back to the known Render deployment
          TARGET_URL="${APP_URL:-https://jobhunt-pro.onrender.com}"
          echo "Pinging $TARGET_URL/health to prevent sleep..."
          curl -sS --retry 3 --max-time 15 "$TARGET_URL/health" || echo "Ping failed but continuing..."
          # Also ping the swarm service
          curl -sS --retry 2 --max-time 10 "https://jobhunt-pro-swarm.onrender.com/health" || true
          echo "Keep-alive ping complete."
