name: PA Watchdog - Monthly Auto Renew

on:
  schedule:
    # Run on the 1st and 15th of every month at 02:00 UTC
    - cron: '0 2 1,15 * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  renew_pythonanywhere:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          python -m playwright install chromium --with-deps

      - name: Run Auto-Renewer Script
        env:
          PA_USER: ${{ secrets.PA_USER }}
          PA_PASS: ${{ secrets.PA_PASS }}
          PA_TOTP_SECRET: ${{ secrets.PA_TOTP_SECRET }}
        run: python scripts/auto_renew_pa.py
