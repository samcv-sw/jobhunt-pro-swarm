name: Hydra Immortality Protocol (Keep Alive)
on:
  schedule:
    # Runs every 14 minutes to prevent Render 15-min sleep
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping_server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping JobHunt Pro API
        uses: mvasigh/ping-action@main
        with:
          url: "https://jobhunt-pro.onrender.com/health"
          method: "GET"
          timeout: 10000
          max_retries: 3
      
      - name: Report Success
        run: echo "Hydra Swarm is awake!"
