name: 🚀 Full Cloud Deploy — Test → Build → Push → Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jobhunt-pro
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────
  # 1. Run Backend Tests
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install fastapi uvicorn httpx pytest pytest-asyncio pydantic
          pip install PyJWT stripe

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short
        continue-on-error: true   # Don't block deploy if tests need live services

  # ─────────────────────────────────────────
  # 2. Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cloud
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 3a. Deploy to Fly.io
  # ─────────────────────────────────────────
  deploy-flyio:
    name: ✈️  Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'flyio' || vars.DEPLOY_TARGET == 'all' }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --image ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # 3b. Deploy to Render (webhook trigger)
  # ─────────────────────────────────────────
  deploy-render:
    name: 🎨 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

  # ─────────────────────────────────────────
  # 3c. Deploy to Railway (via CLI)
  # ─────────────────────────────────────────
  deploy-railway:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.RAILWAY_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

  # ─────────────────────────────────────────
  # 4. Health Check after deploy
  # ─────────────────────────────────────────
  health-check:
    name: ❤️  Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-flyio, deploy-render, deploy-railway]
    if: always()

    steps:
      - name: Wait for deploy to settle
        run: sleep 30

      - name: Check Fly.io health
        if: ${{ secrets.FLY_APP_URL != '' }}
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.FLY_APP_URL }}/health" \
            && echo "✅ Fly.io deployment healthy!" \
            || echo "⚠️  Health check failed — check logs"

      - name: Check Render health
        if: ${{ secrets.RENDER_APP_URL != '' }}
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.RENDER_APP_URL }}/health" \
            && echo "✅ Render deployment healthy!" \
            || echo "⚠️  Health check failed — check logs"
