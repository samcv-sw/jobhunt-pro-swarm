name: Immortal API Ping

on:
  schedule:
    # Runs every 10 minutes to prevent HF Spaces, Render, and Koyeb from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping_hydra:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PythonAnywhere (Primary)
        run: |
          curl -f -s -o /dev/null -w "%{http_code}\n" https://jhfguf.pythonanywhere.com/healthz || echo "PA sleeping/offline"

      - name: Ping Fly.io (Backup 1)
        run: |
          curl -f -s -o /dev/null -w "%{http_code}\n" https://jobhunt-pro.fly.dev/healthz || echo "Fly.io sleeping/offline"

      - name: Ping Zeabur (Backup 2)
        run: |
          curl -f -s -o /dev/null -w "%{http_code}\n" https://jobhunt-pro.zeabur.app/healthz || echo "Zeabur sleeping/offline"

      - name: Ping Render (Backup 3)
        run: |
          curl -f -s -o /dev/null -w "%{http_code}\n" https://jobhunt-pro.onrender.com/healthz || echo "Render sleeping/offline"
