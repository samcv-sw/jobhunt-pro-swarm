name: Keep Alive

on:
  schedule:
    - cron: "*/15 * * * *" # Runs every 15 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -s https://jobhunt-pro.onrender.com/health || echo "Render ping failed"
          curl -s https://jobhunt-pro.vercel.app/ || echo "Vercel ping failed"
