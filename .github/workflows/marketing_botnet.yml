name: 🕸️ Viral Marketing Botnet

on:
  schedule:
    # Runs every 3 hours automatically
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  run-marketing-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🔑 Generate .env from Secrets
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "GMAIL1_USER=${{ secrets.GMAIL1_USER }}" >> .env
          echo "GMAIL1_PASS=${{ secrets.GMAIL1_PASS }}" >> .env
          echo "GMAIL2_USER=${{ secrets.GMAIL2_USER }}" >> .env
          echo "GMAIL2_PASS=${{ secrets.GMAIL2_PASS }}" >> .env
          echo "GMAIL3_USER=${{ secrets.GMAIL3_USER }}" >> .env
          echo "GMAIL3_PASS=${{ secrets.GMAIL3_PASS }}" >> .env
          echo "GMAIL4_USER=${{ secrets.GMAIL4_USER }}" >> .env
          echo "GMAIL4_PASS=${{ secrets.GMAIL4_PASS }}" >> .env
          echo "GMAIL5_USER=${{ secrets.GMAIL5_USER }}" >> .env
          echo "GMAIL5_PASS=${{ secrets.GMAIL5_PASS }}" >> .env
          # Ensure .env is available for the scripts
          
      - name: 🕷️ Run Lead Generator (GitHub Scout)
        run: python lead_generator.py

      - name: 📧 Run Auto-Marketer (Email Blast)
        run: python auto_marketer.py
        
      - name: 💾 Commit updated leads.db (Save State)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add leads.db
          git commit -m "🤖 Auto-update leads database" || exit 0
          git push
