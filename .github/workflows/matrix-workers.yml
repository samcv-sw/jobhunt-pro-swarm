name: JobHunt Pro — Matrix Compute Workers
on:
  workflow_dispatch:
    inputs:
      campaign_id:
        description: 'Campaign ID to process'
        required: false
        default: 'auto'
      user_id:
        description: 'User ID (optional)'
        required: false
        default: 'all'
      mode:
        description: 'Mode: scrape | apply | email | analyze | full'
        required: true
        default: 'full'
  schedule:
    # Every 12 hours — 2 runs/day (Saves GHA minutes, fits 2000m free tier)
    - cron: '0 */12 * * *'

env:
  WORKER_URL: 'https://jobhunt-pro-router.samsalameh-cv.workers.dev'
  PA_URL: 'https://jhfguf.pythonanywhere.com'

jobs:
  # ── Job 1: Scrapers Matrix (Parallel, optimized depth) ──
  scrape_matrix:
    name: 🕸️ Run All Scrapers (Concurrent)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 requests dnspython --quiet

      - name: Scrape and Import Concurrently
        env:
          WORKER_URL: ${{ env.WORKER_URL }}
          PA_URL: ${{ env.PA_URL }}
        run: |
          python scripts/run_all_scrapers.py

  # ── Job 2: Email Batch (30 min — bypasses PA timeout) ──
  email_batch:
    name: 📧 Email Batch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'email' || inputs.mode == 'full') }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install httpx aiosmtplib requests --quiet

      - name: Process email queue
        shell: python
        run: |
          import requests, json, time, sys, base64, os

          WORKER = os.environ.get('WORKER_URL', 'https://jobhunt-pro-router.samsalameh-cv.workers.dev')
          try:
            import sys
            sys.path.insert(0, '.')
            import config
            default_site = getattr(config, 'SITE_URL', 'https://jhfguf.pythonanywhere.com')
          except Exception:
            default_site = 'https://jhfguf.pythonanywhere.com'
          PA = os.environ.get('SITE_URL', os.environ.get('PA_URL', default_site))

          # Fetch pending emails through Worker proxy
          try:
            r = requests.get(f'{PA}/api/emails/pending?limit=200', timeout=30)
            if r.status_code != 200:
              print(f'No pending emails: {r.status_code}')
              sys.exit(0)
            data = r.json()
            pending = data.get('emails', data.get('pending', []))
            print(f'Processing {len(pending)} emails on GH (bypasses PA 300s timeout!)')

            success = 0
            for email in pending:
              try:
                # Use PA's send-one endpoint
                resp = requests.post(f'{PA}/api/emails/send-one',
                  json={'id': email.get('id')},
                  timeout=30)
                if resp.status_code == 200:
                  success += 1
                time.sleep(0.3)
              except Exception as e:
                print(f'  Email #{email.get("id","?")} failed: {e}')

            print(f'Result: {success}/{len(pending)} sent')
          except Exception as e:
            print(f'Error: {e}')
            sys.exit(1)

  # ── Job 3: AI Analysis (for full cycle) ──
  analyze:
    name: 🧠 AI Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'analyze' || inputs.mode == 'full') }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests --quiet

      - name: AI score & match
        shell: python
        run: |
          import requests, json, os, sys

          try:
            import sys
            sys.path.insert(0, '.')
            import config
            default_site = getattr(config, 'SITE_URL', 'https://jhfguf.pythonanywhere.com')
          except Exception:
            default_site = 'https://jhfguf.pythonanywhere.com'
          PA = os.environ.get('SITE_URL', os.environ.get('PA_URL', default_site))

          # Get unscored jobs from PA
          r = requests.get(f'{PA}/api/jobs/unscored?limit=100', timeout=30)
          if r.status_code != 200:
            print(f'No unscored jobs: {r.status_code}')
            sys.exit(0)

          jobs = r.json().get('jobs', r.json().get('results', []))
          print(f'Scoring {len(jobs)} jobs...')

          scored = 0
          for job in jobs:
            try:
              resp = requests.post(f'{PA}/api/jobs/score',
                json={'job_id': job.get('id'), 'job_title': job.get('title'), 'company': job.get('company')},
                timeout=30)
              if resp.status_code == 200:
                scored += 1
            except:
              pass

          print(f'Scored {scored}/{len(jobs)} jobs')

  # ── Job 4: Sync PA → D1 ──
  sync_d1:
    name: 🔄 Sync PA → D1
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Sync latest data to Cloudflare D1
        run: |
          # Sync users
          curl -s "$WORKER_URL/api/health" -m 10
          echo ""
          # Trigger PA sync via Worker
          SYNC_RESULT=$(curl -s -X POST "$WORKER_URL/api/sync" \
            -H "Content-Type: application/json" \
            -d '{"table":"stats","action":"sync","data":{"id":0}}' -m 15)
          echo "Sync: $SYNC_RESULT"

  # ── Job 5: Report to Telegram ──
  report:
    name: 📊 Report
    runs-on: ubuntu-latest
    needs: [scrape_matrix, sync_d1]
    if: always()

    steps:
      - name: Generate status report
        run: |
          REPORT="📊 JobHunt Pro — Matrix Round Complete"
          REPORT+=$'\nWorker: jobhunt-pro-router.samsalameh-cv.workers.dev'
          REPORT+=$'\nPA: jhfguf.pythonanywhere.com'
          REPORT+=$'\nTime: $(date -u)'
          echo "$REPORT"
          echo "REPORT<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
