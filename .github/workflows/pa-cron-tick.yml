name: PA Cron Tick
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-pa:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloud Tick (v2 endpoint with company_limit)
        run: curl -sS --max-time 240 -o /dev/null -w "%{http_code}" "https://jhfguf.pythonanywhere.com/api/v2/cloud-tick"
      - name: Check PA Health
        run: curl -sSf "https://jhfguf.pythonanywhere.com/" > /dev/null 2>&1 && echo "PA HEALTHY" || echo "PA UNHEALTHY"
