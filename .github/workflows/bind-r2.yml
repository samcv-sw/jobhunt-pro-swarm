name: Bind R2 to Worker
on: workflow_dispatch
jobs:
  bind-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug CF Token
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Checking CF API token..."
          ACC_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else 'NONE')")
          echo "Account ID: $ACC_ID"
          TOKEN_INFO=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "Token valid: $(echo "$TOKEN_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success', False))")"
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACC_ID/r2/buckets/jobhunt-files" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d.get('success'):
    b=d['result']
    print(f'Bucket: {b.get(\"name\")} ({b.get(\"creation_date\",\"?\")})')
    print(f'Location: {b.get(\"location\",\"?\")}')
else:
    print(f'Errors: {d.get(\"errors\",\"?\")}')
"
