name: Bind R2 to Worker
on: workflow_dispatch

jobs:
  bind-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Worker Script
        run: cat cloudflare/worker.js | head -5

      - name: Bind R2 via API
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Get account ID
          ACC_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else 'NONE')")
          echo "Account ID: $ACC_ID"
          
          # Check token permissions
          TOKEN_INFO=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "Token status: $(echo $TOKEN_INFO | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('messages',[d.get('errors',['?'][0])])[0])")"
          
          # Check if worker service exists
          SERVICE_INFO=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACC_ID/workers/services/jobhunt-pro-router")
          echo "Service exists: $(echo $SERVICE_INFO | python3 -c "import sys,json; d=json.load(sys.stdin); print('YES' if d.get('success') else 'NO')")"
          
          # Get worker bindings
          BINDINGS=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACC_ID/workers/services/jobhunt-pro-router/environments/production")
          echo "Current env: $(echo $BINDINGS | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if d.get('success') else str(d))" 2>/dev/null || echo 'Error')"
          
          # Try to create/check R2 bucket
          R2_INFO=$(curl -s -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACC_ID/r2/buckets/jobhunt-files")
          echo "R2 bucket create: $(echo $R2_INFO | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors',[d.get('messages','?')]))" 2>/dev/null || echo 'Error')"
          
          echo ""
          echo "=== TOKEN PERMISSIONS ==="
          echo $TOKEN_INFO | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(json.dumps(d, indent=2))
" 2>/dev/null || echo "Parse error"
