name: Bind R2
on:
  workflow_dispatch:
jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check R2 Bucket
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          ACC_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])" 2>/dev/null)
          echo "Account: $ACC_ID"
          curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$ACC_ID/r2/buckets" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {b[\"name\"]}') for b in d.get('result',[])]"
