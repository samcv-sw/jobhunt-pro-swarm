name: PythonAnywhere Auto-Renewal (Immortality Protocol)

on:
  schedule:
    # Run at 00:00 on the 1st and 15th of every month
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  extend-pa-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          playwright install chromium
          
      - name: 🤖 Execute PA Auto-Renewal Script
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_PASSWORD: ${{ secrets.PA_PASSWORD }}
          PA_TOTP_SECRET: ${{ secrets.PA_TOTP_SECRET }}
        run: |
          python scripts/pa_extender.py
