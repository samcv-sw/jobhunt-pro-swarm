name: Keep-Alive Ping

on:
  schedule:
    - cron: '*/12 * * * *'   # Every 12 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Render Health Endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping /api/v1/health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 15 \
            "${{ secrets.RENDER_URL }}/api/v1/health"
