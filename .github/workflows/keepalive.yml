name: Keep-Alive Ping

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" https://jobhunt-pro-saas.onrender.com/health || echo "Ping failed"
