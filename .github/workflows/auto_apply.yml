name: Zero-Cost JobHunt Pro Agent

on:
  schedule:
    # Run at specific, non-symmetrical hours (e.g., 2 AM, 7 AM, 11 AM, 4 PM, 9 PM UTC)
    - cron: '15 2,7,11,16,21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "jobhunt-pro-bot"
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'
      
      - name: Install Dependencies
        working-directory: bot
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: bot
        run: npx playwright install chromium

      - name: Run JobHunt Pro Agent (TypeScript)
        working-directory: bot
        env:
          GROQ_KEYS_JSON: ${{ secrets.GROQ_KEYS_JSON }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm start

  deploy-pages:
    needs: run-agent
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
