name: Zero-Cost JobHunt Pro Agent

on:
  schedule:
    # Run at specific, non-symmetrical hours (e.g., 2 AM, 7 AM, 11 AM, 4 PM, 9 PM UTC)
    - cron: '15 2,7,11,16,21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "jobhunt-pro-bot"
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Reverted to 15 mins to save quota since Jitter is max 5 mins
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Cloudflare WARP (Hide GitHub IP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5
          # Test if WARP proxy is working
          curl -x socks5://127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./bot
        run: |
          npm install
          npx playwright install chromium

      - name: Run Node.js JobHunt Pro Agent
        working-directory: ./bot
        env:
          GROQ_KEYS_JSON: ${{ secrets.GROQ_KEYS_JSON }}
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: |
          npm start

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    needs: run-agent
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
