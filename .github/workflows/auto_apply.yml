name: Zero-Cost JobHunt Pro Agent

on:
  schedule:
    # Run at specific, non-symmetrical hours (e.g., 2 AM, 7 AM, 11 AM, 4 PM, 9 PM UTC)
    - cron: '15 2,7,11,16,21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "jobhunt-pro-bot"
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Reverted to 15 mins to save quota since Jitter is max 5 mins
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Cloudflare WARP (Hide GitHub IP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
  ping-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Hugging Face Space Alive
        run: |
          # Replace this URL with your actual Hugging Face Space URL
          curl -s "https://your-hugging-face-space-url.hf.space/ping" || echo "Ping failed but continuing"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    needs: run-agent
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
