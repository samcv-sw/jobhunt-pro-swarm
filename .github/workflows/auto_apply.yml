name: Zero-Cost JobHunt Pro Agent

on:
  schedule:
    # Run at specific, non-symmetrical hours (e.g., 2 AM, 7 AM, 11 AM, 4 PM, 9 PM UTC)
    - cron: '15 2,7,11,16,21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read

concurrency:
  group: "jobhunt-pro-bot"
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'bot/package-lock.json'
          
      - name: Setup Cloudflare WARP (Hide GitHub IP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode proxy
          sudo warp-cli --accept-tos connect
          sleep 5
          curl -x socks5://127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace
      
      - name: Install Dependencies
        working-directory: bot
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: bot
        run: npx playwright install chromium

      - name: Run JobHunt Pro Agent (TypeScript)
        working-directory: bot
        env:
          GROQ_KEYS_JSON: ${{ secrets.GROQ_KEYS_JSON }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Tell Node to route traffic through the WARP proxy
          ALL_PROXY: socks5://127.0.0.1:40000
        run: npm start

  keep-dashboard-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          echo "Pinging Hugging Face Dashboard to prevent it from going to sleep..."
          curl -s https://tomas2336546-jobhunt-pro-dashboard.hf.space || true
