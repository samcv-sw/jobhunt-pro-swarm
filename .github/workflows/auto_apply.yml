name: Zero-Cost JobHunt Pro Agent

on:
  schedule:
    # Run at specific, non-symmetrical hours (e.g., 2 AM, 7 AM, 11 AM, 4 PM, 9 PM UTC)
    - cron: '15 2,7,11,16,21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 40  # Increased to accommodate the random 20-minute sleep jitter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth groq html2text
          playwright install chromium

      - name: Run JobHunt Pro Agent
        env:
          GROQ_KEYS_JSON: ${{ secrets.GROQ_KEYS_JSON }}
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
        run: |
          python backend/gh_auto_apply.py

      - name: Commit State Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add state.json
          git commit -m "Automated update: job applications state" || echo "No changes to commit"
          git push

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    needs: run-agent
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
