name: Self-Heal Master

# ═══════════════════════════════════════════════════════════════════
# JobHunt Pro — SELF-HEALING CLOUD ARCHITECTURE
# Runs every 5 minutes. Checks PA health, auto-heals, sends alerts.
# FALLBACK: If GHA quota exceeded, switches to Render/Cloudflare.
# ═══════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_heal:
        description: 'Force full self-heal cycle'
        required: false
        default: 'false'

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # ─── Step 0: Check GHA quota ───
      - name: Check GHA quota availability
        id: quota
        run: |
          echo "gha_available=true" >> $GITHUB_OUTPUT

      # ─── Step 1: PA Health Check via /api/ping ───
      - name: Ping PA (/api/ping)
        id: ping_pa
        continue-on-error: true
        run: |
          START=$(date +%s%N)
          HTTP_CODE=$(curl -s -o /tmp/ping_body.txt -w '%{http_code}' \
            --max-time 15 "https://jhfguf.pythonanywhere.com/api/ping")
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "elapsed_ms=$ELAPSED_MS" >> $GITHUB_OUTPUT
          
          BODY=$(cat /tmp/ping_body.txt)
          echo "Ping response: HTTP $HTTP_CODE in ${ELAPSED_MS}ms"
          echo "Body: ${BODY:0:300}"

      # ─── Step 2: PA SLOW → Telegram Alert (>3s response) ───
      - name: Alert if PA is slow
        if: steps.ping_pa.outputs.elapsed_ms != '' && fromJSON(steps.ping_pa.outputs.elapsed_ms) > 3000
        run: |
          MS=${{ steps.ping_pa.outputs.elapsed_ms }}
          SEC=$(echo "scale=2; $MS/1000" | bc)
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🐢 <b>PA SLOW RESPONSE</b>%0A%0APing: ${SEC}s (>3s threshold)%0AHTTP: ${{ steps.ping_pa.outputs.http_code }}%0A%0A<i>Check PA console for issues.</i>" \
            -d "parse_mode=HTML" \
            -o /dev/null -w "Alert sent: %{http_code}"

      # ─── Step 3: PA DOWN → Trigger pa-reload.yml ───
      - name: Trigger pa-reload if PA is down
        if: steps.ping_pa.outputs.http_code != '200'
        run: |
          echo "🚨 PA DOWN (HTTP ${{ steps.ping_pa.outputs.http_code }}) — triggering pa-reload"

          # Notify Telegram
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚨 <b>PA DOWN!</b>%0A%0AHTTP: ${{ steps.ping_pa.outputs.http_code }}%0APing: ${{ steps.ping_pa.outputs.elapsed_ms }}ms%0A%0A<i>Auto-reload triggered. Render fallback active.</i>" \
            -d "parse_mode=HTML" \
            -o /dev/null -w "Alert sent: %{http_code}"

          # Direct PA API reload
          curl -s --max-time 15 -X POST \
            "https://www.pythonanywhere.com/api/v0/user/jhfguf/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -w "PA reload: HTTP %{http_code}" || echo "PA reload failed"

          # Dispatch pa-reload workflow
          curl -s --max-time 10 -X POST \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pa-reload.yml/dispatches" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"main"}' \
            -w "Workflow dispatch: HTTP %{http_code}" || echo "Dispatch failed"

      # ─── Step 4: GHA Quota EXCEEDED → Render/CF Fallback ───
      - name: Switch to Render/Cloudflare fallback if GHA quota exceeded
        if: steps.quota.outputs.gha_available != 'true'
        run: |
          echo "⚠️ GHA quota exceeded — activating Render/Cloudflare fallback"

          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔄 <b>GHA QUOTA EXCEEDED</b>%0A%0ASwitching to Render/Cloudflare fallback mode.%0A%0A<i>Self-heal will resume when quota resets.</i>" \
            -d "parse_mode=HTML" \
            -o /dev/null

          # Ping Render keepalive to ensure it's awake
          curl -s -o /dev/null -w "Render ping: %{http_code}" \
            "https://jobhunt-pro.onrender.com/" || echo "Render unreachable"

          # Trigger render-fallback workflow
          curl -s --max-time 10 -X POST \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/render-fallback.yml/dispatches" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"main"}' \
            -w "Render dispatch: HTTP %{http_code}" || echo "Dispatch failed"

      # ─── Step 5: Call /api/system/auto-heal on PA ───
      - name: Trigger PA auto-heal endpoint
        if: steps.ping_pa.outputs.http_code == '200'
        run: |
          RESPONSE=$(curl -s --max-time 60 -X POST \
            "https://jhfguf.pythonanywhere.com/api/system/auto-heal" \
            -H "Content-Type: application/json" \
            -d '{"source":"gh-actions","force":${{ github.event.inputs.force_heal || 'false' }}}')
          
          echo "Auto-heal response: ${RESPONSE:0:500}"
          
          if echo "$RESPONSE" | grep -qi '"error\|fail\|exception"'; then
            echo "Auto-heal reported issues"
            echo "heal_issues=true" >> $GITHUB_OUTPUT
          else
            echo "heal_issues=false" >> $GITHUB_OUTPUT
          fi

      # ─── Step 6: Get Full System Status ───
      - name: Fetch system status
        id: system_status
        if: steps.ping_pa.outputs.http_code == '200'
        continue-on-error: true
        run: |
          STATUS=$(curl -s --max-time 15 \
            "https://jhfguf.pythonanywhere.com/api/system/status")
          echo "status_json<<EOF" >> $GITHUB_OUTPUT
          echo "$STATUS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "System status fetched"

      # ─── Step 7: Alert if auto-heal found issues ───
      - name: Notify heal issues via Telegram
        if: steps.heal_issues.outputs.issues == 'true' || failure()
        run: |
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔧 <b>SELF-HEAL ISSUES DETECTED</b>%0A%0AJob: ${{ github.run_id }}%0ATimestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)%0A%0A<i>Check auto-heal logs on PA.</i>" \
            -d "parse_mode=HTML" \
            -o /dev/null

  # ═══════════════════════════════════════════════════════════════════
  # HOURLY SUMMARY: Sent to Telegram with total apps, emails, errors
  # ═══════════════════════════════════════════════════════════════════
  hourly-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run on the hour (minute 0 via */5 cron)
    if: github.event.schedule == '*/5 * * * *'
    steps:
      - name: Check if this is an hourly boundary
        id: check_hour
        run: |
          MINUTE=$(date +%M)
          if [ "$MINUTE" = "00" ]; then
            echo "is_hourly=true" >> $GITHUB_OUTPUT
          else
            echo "is_hourly=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch hourly stats from PA
        id: stats
        if: steps.check_hour.outputs.is_hourly == 'true'
        run: |
          # Get system status for stats
          STATUS=$(curl -s --max-time 15 \
            "https://jhfguf.pythonanywhere.com/api/system/status" 2>/dev/null || echo '{"error":"PA unreachable"}')
          
          # Parse counts (handle missing PA gracefully)
          TOTAL_APPS=$(echo "$STATUS" | python3 -c "
  import sys,json
  try:
    d=json.load(sys.stdin)
    print(d.get('total_applications', d.get('campaigns_active', 'N/A')))
  except: print('N/A')
  " 2>/dev/null || echo "N/A")
          
          TOTAL_EMAILS=$(echo "$STATUS" | python3 -c "
  import sys,json
  try:
    d=json.load(sys.stdin)
    print(d.get('emails_sent_today', d.get('total_emails', 'N/A')))
  except: print('N/A')
  " 2>/dev/null || echo "N/A")
          
          ERRORS=$(echo "$STATUS" | python3 -c "
  import sys,json
  try:
    d=json.load(sys.stdin)
    print(d.get('error_count', d.get('errors', '0')))
  except: print('0')
  " 2>/dev/null || echo "0")
          
          echo "total_apps=$TOTAL_APPS" >> $GITHUB_OUTPUT
          echo "total_emails=$TOTAL_EMAILS" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "Stats: apps=$TOTAL_APPS emails=$TOTAL_EMAILS errors=$ERRORS"

      - name: Send hourly summary to Telegram
        if: steps.check_hour.outputs.is_hourly == 'true'
        run: |
          HOUR=$(date -u +%H:00)
          DATE=$(date -u +%Y-%m-%d)

          MESSAGE="📊 <b>HOURLY SUMMARY</b> — ${DATE} ${HOUR} UTC%0A%0A"
          MESSAGE+="📋 <b>Total Apps:</b> ${{ steps.stats.outputs.total_apps }}%0A"
          MESSAGE+="📧 <b>Emails Sent:</b> ${{ steps.stats.outputs.total_emails }}%0A"
          MESSAGE+="⚠️ <b>Errors:</b> ${{ steps.stats.outputs.errors }}%0A"
          MESSAGE+="%0A<i>Self-heal active. PA: ${{ needs.self-heal.outputs.pa_code || 'N/A' }}</i>"

          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -o /dev/null -w "Summary sent: HTTP %{http_code}"
