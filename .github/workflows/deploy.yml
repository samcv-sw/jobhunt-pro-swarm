name: Deploy to Render, Fly.io and PythonAnywhere

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          method: 'POST'
          timeout: 10000

  deploy-flyio:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup flyctl
        if: ${{ env.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy to Fly.io
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: flyctl deploy --remote-only

  deploy-pythonanywhere:
    runs-on: ubuntu-latest
    env:
      PA_DEPLOY_HOOK: ${{ secrets.PYTHONANYWHERE_DEPLOY_HOOK_URL }}
      PA_DEPLOY_KEY: ${{ secrets.PYTHONANYWHERE_DEPLOY_SECRET }}
    steps:
      - name: Trigger PythonAnywhere Deployment
        if: ${{ env.PA_DEPLOY_HOOK != '' && env.PA_DEPLOY_KEY != '' }}
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.PYTHONANYWHERE_DEPLOY_HOOK_URL }}/deploy?key=${{ secrets.PYTHONANYWHERE_DEPLOY_SECRET }}
          method: 'POST'
          timeout: 30000
          preventFailureOnNoResponse: true
