name: Weekly Test Suite

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full test suite
        env:
          TESTING: 'true'
          JWT_SECRET_KEY: 'weekly-ci-test-secret-key-32bytes!!'
          FORCE_SQLITE: '1'
          DB_PATH: '/tmp/test_weekly.db'
        run: |
          python -m pytest tests/ -q --tb=short 2>&1 | tee test_output.txt
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          exit $EXIT
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🚨 JobHunt Pro Weekly Tests FAILED%0ARun: ${{ github.run_id }}%0ABranch: ${{ github.ref_name }}%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}"
          fi
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-test-results
          path: test_output.txt
          retention-days: 30
