name: Deploy to PA
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload files & Reload PA
        run: |
          set -e
          TOKEN="${{ secrets.PA_TOKEN }}"
          API="https://www.pythonanywhere.com/api/v0/user/jhfguf"
          
          # Upload each file
          for f in "web/frontend_api.py" "web/app_v2.py"; do
            if [ -f "$f" ]; then
              echo "=== Uploading $f ==="
              HTTP_CODE=$(curl -s -o /tmp/upload_resp.txt -w "%{http_code}" -X PUT \
                "${API}/files/path/$f" \
                -H "Authorization: Token ${TOKEN}" \
                --data-binary "@${f}" \
                --max-time 30)
              echo "HTTP Code: ${HTTP_CODE}"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "SUCCESS: $f uploaded"
              else
                echo "Response: $(cat /tmp/upload_resp.txt)"
              fi
            fi
          done

          # Reload
          echo "=== Reloading PA ==="
          HTTP_CODE=$(curl -s -o /tmp/reload_resp.txt -w "%{http_code}" -X POST \
            "${API}/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${TOKEN}" \
            --max-time 30)
          echo "HTTP Code: ${HTTP_CODE}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "SUCCESS: PA reloaded!"
          else
            echo "Response: $(cat /tmp/reload_resp.txt)"
          fi
