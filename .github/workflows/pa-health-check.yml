name: PA Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PA main app
        id: check_main
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 \
            https://jhfguf.pythonanywhere.com/api/cloud-health 2>&1 || echo "000")
          echo "pa_code=$CODE" >> $GITHUB_OUTPUT
          echo "PA health: $CODE"

      - name: Check PA DB
        id: check_db
        run: |
          if curl -s --max-time 15 -o /tmp/health.json -w '%{http_code}' \
            "https://jhfguf.pythonanywhere.com/api/ping" > /tmp/ping_code.txt 2>&1; then
            CODE=$(cat /tmp/ping_code.txt)
            echo "db_code=$CODE" >> $GITHUB_OUTPUT
          else
            echo "db_code=000" >> $GITHUB_OUTPUT
          fi

      - name: Alert if unhealthy
        if: steps.check_main.outputs.pa_code != '200'
        run: |
          echo "🚨 PA UNHEALTHY (code=${{ steps.check_main.outputs.pa_code }})"
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6639482672" \
            -d "text=🚨 PA HEALTH FAILED: ${{ steps.check_main.outputs.pa_code }}" \
            -o /dev/null -w "%{http_code}"

      - name: Attempt PA restart if dead
        if: steps.check_main.outputs.pa_code != '200'
        run: |
          echo "Attempting PA restart..."
          curl -s --max-time 15 -X POST \
            "https://www.pythonanywhere.com/api/v0/user/jhfguf/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -w "\nRestart: %{http_code}"
