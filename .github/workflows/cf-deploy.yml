name: Deploy Pages Frontend
on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/pages/**'
      - 'cloudflare/worker.js'
      - 'cloudflare/d1_schema.sql'
      - 'cloudflare/wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Migrate D1 Database
        run: |
          npx wrangler d1 execute jobhunt-pro-db --remote --command="ALTER TABLE jobs ADD COLUMN email TEXT;"
          npx wrangler d1 execute jobhunt-pro-db --remote --command="ALTER TABLE applications ADD COLUMN campaign_id INTEGER;"
          npx wrangler d1 execute jobhunt-pro-db --remote --command="CREATE TABLE IF NOT EXISTS email_outbox (id INTEGER PRIMARY KEY AUTOINCREMENT, campaign_id INTEGER, user_id INTEGER, job_id INTEGER, to_email TEXT NOT NULL, to_name TEXT, subject TEXT, body TEXT, status TEXT DEFAULT 'queued', error TEXT, created_at TEXT DEFAULT (datetime('now')), sent_at TEXT, FOREIGN KEY (user_id) REFERENCES users(id), FOREIGN KEY (campaign_id) REFERENCES campaigns(id));"
          npx wrangler d1 execute jobhunt-pro-db --remote --command="CREATE INDEX IF NOT EXISTS idx_outbox_status ON email_outbox(status);"
          npx wrangler d1 execute jobhunt-pro-db --remote --command="CREATE INDEX IF NOT EXISTS idx_outbox_user ON email_outbox(user_id);"
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Deploy Olympus Webhook
        run: npx wrangler deploy
        working-directory: olympus_webhook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Deploy Pages
        run: npx wrangler pages deploy pages --project-name jobhunt --branch main
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Reload PythonAnywhere Web App
        run: |
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/jhfguf/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            --max-time 30
        continue-on-error: true
