name: Deploy Pages Frontend
on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/pages/**'
      - 'cloudflare/worker.js'
      - 'cloudflare/d1_schema.sql'
      - 'cloudflare/wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Deploy Pages
        run: npx wrangler pages deploy pages --project-name jobhunt --branch main
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        continue-on-error: true

      - name: Reload PythonAnywhere Web App
        run: |
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/jhfguf/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            --max-time 30
        continue-on-error: true
