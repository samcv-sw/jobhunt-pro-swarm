name: Cloud Master Tick
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_mode:
        description: 'Force mode (normal/heal/hyper)'
        required: false
        default: 'normal'

jobs:
  master-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Tick PA API (primary cron endpoint)
        id: pa-tick
        continue-on-error: true
        run: |
          echo "=== CLOUD TICK v2 ==="
          RESPONSE=$(curl -s --max-time 240 \
            -X POST "https://jhfguf.pythonanywhere.com/api/v2/cloud-tick" \
            -H "Content-Type: application/json" \
            -d '{"action":"cloud_tick","source":"gh-actions"}')
          echo "Response: $RESPONSE"
          echo "status=$(echo $RESPONSE | python3 -c "import sys,json; exec('try: print(json.load(sys.stdin).get(\"status\",\"unknown\"))\nexcept: print(\"parse_error\")')" 2>/dev/null || echo "unknown")" >> $GITHUB_OUTPUT

      - name: Check PA health (fallback)
        id: pa-health
        continue-on-error: true
        run: |
          CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://jhfguf.pythonanywhere.com/api/ping")
          echo "PA ping: $CODE"
          echo "pa_code=$CODE" >> $GITHUB_OUTPUT

      - name: Attempt PA restart if unhealthy
        if: steps.pa-health.outputs.pa_code != '200'
        run: |
          echo "PA is unhealthy (${{ steps.pa-health.outputs.pa_code }}). Restarting..."
          curl -s --max-time 15 -X POST \
            "https://www.pythonanywhere.com/api/v0/user/jhfguf/webapps/jhfguf.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"

      - name: Notify on Telegram
        if: failure()
        run: |
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6639482672" \
            -d "text=🚨 CLOUD TICK FAILED! PA unhealthy."
