name: Email Outbox Processor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trigger-pa-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger PA cron tick (processes email outbox)
        run: |
          curl -s --max-time 60 -X POST \
            "https://jhfguf.pythonanywhere.com/api/cron/tick" \
            -H "Content-Type: application/json" \
            -d '{"action":"process_outbox"}' \
            -w "\nHTTP: %{http_code}"
      - name: Trigger Worker network
        run: |
          curl -s --max-time 10 "https://jobhunt-pro-router.samsalameh-cv.workers.dev/api/cron/tick" -w "\nHTTP: %{http_code}"
