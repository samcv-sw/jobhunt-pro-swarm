name: JobHunt Pro — Serverless Email Sender

on:
  schedule:
    # Run every 15 minutes automatically
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allow manual execution from GitHub Actions UI

jobs:
  send-emails:
    name: 📧 Cloud Outbox Sender
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process Outbox Queue
        run: |
          python scripts/cloud_email_sender.py
