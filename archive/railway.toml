# ============================================
# JobHunt Pro - Railway Configuration
# Free tier: $5 credit/month, 512MB RAM
# SQLite mode (no PostgreSQL needed)
# ============================================

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.cloud"

[deploy]
startCommand = "python start_cloud.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[deploy.scaling]
minReplicas = 1
