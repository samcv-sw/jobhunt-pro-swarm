name: Deploy Core & Web Files to PA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install requests

      - name: Run Massive Auto-Deploy Script
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN || secrets.PA_TOKEN }}
          PA_USER: ${{ vars.PA_USER }}
          PA_DOMAIN: ${{ vars.PA_DOMAIN }}
        run: python deploy_all_to_pa.py
