name = "jobhunt-pro-queue-worker"
main = "infrastructure/cloudflare_queue_worker.js"
compatibility_date = "2024-03-01"

# Automatically create and bind the Queue
[[queues.producers]]
queue = "hydra-task-queue"
binding = "HYDRA_TASK_QUEUE"

[[queues.consumers]]
queue = "hydra-task-queue"
# Process up to 50 requests per batch to avoid overloading the backend
max_batch_size = 50
# Wait up to 5 seconds before processing a batch
max_batch_timeout = 5
# Automatically retry up to 10 times if backend is down
max_retries = 10

# Backend URL goes here (Fly.io or Render URL)
[vars]
BACKEND_API_URL = "https://jobhunt-pro.fly.dev/api/v1/swarm/task"

# Secrets (Add via `wrangler secret put BACKEND_SECRET`)
# BACKEND_SECRET = "***"
