apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobhunt-pro.fullname" . }}-celery
  labels:
    app: celery-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command: ["celery", "-A", "backend.tasks", "worker", "--loglevel=info", "--concurrency=4"]
          env:
            - name: REDIS_URL
              value: "redis://{{ include "jobhunt-pro.fullname" . }}-redis:6379/0"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jobhunt-secrets
                  key: groq-api-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ include "jobhunt-pro.fullname" . }}-pvc
