apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobhunt-pro.fullname" . }}-postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:15-alpine"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "jobhunt"
            - name: POSTGRES_USER
              value: "jobhunt_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobhunt-secrets
                  key: pg-password
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "jobhunt-pro.fullname" . }}-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobhunt-pro.fullname" . }}-postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
