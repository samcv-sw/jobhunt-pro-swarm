<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <h2>⚡ JobHunt Pro Sidecar</h2>
  <div class="badge">Status: Autonomous Swarm Active</div>
  <button class="btn" id="btn-apply">✨ Instant 1-Click AI Apply</button>
  <button class="btn btn-secondary" id="btn-tailor">📄 Tailor Resume for ATS</button>
  <button class="btn btn-secondary" id="btn-negotiate">💼 AI Salary Negotiator</button>
  <script src="popup.js"></script>
</body>
</html>
