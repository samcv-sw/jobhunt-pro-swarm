# JobHunt Pro — wrangler.toml v4.0
# Cloudflare Workers + D1 + KV + AI + Cron configuration

name = "jobhunt-pro-router"
main = "worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "jobhunt-pro-db"
database_id = "c477bda2-1ca3-400c-ba1a-a85716b63274"

# ── KV Cache ──
[[kv_namespaces]]
binding = "CACHE"
id = "0b117064b13d4325ba27fa7bf12c1ed6"

# ── Workers AI (free edge inference) ──
[ai]
binding = "AI"

# ── Cron Triggers (campaign processor every 30 min) ──
[[triggers]]
crons = ["*/30 * * * *"]

# ── Variables ──
[vars]
PA_BASE = "https://jhfguf.pythonanywhere.com"
ENVIRONMENT = "production"

# ── R2 Storage (For CV Uploads) ──
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "jobhunt-files"
