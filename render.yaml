services:
  - type: worker
    name: jobhunt-swarm-worker
    env: docker
    region: frankfurt
    plan: free # Runs on Render's Free Tier
    envVars:
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false # Set this in the Render Dashboard
      - key: WHATSAPP_PHONE_ID
        sync: false # Set this in the Render Dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
