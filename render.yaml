services:
  - type: web
    name: jobhunt-swarm-worker
    env: docker
    region: frankfurt
    envVars:
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false # Set this in the Render Dashboard
      - key: WHATSAPP_PHONE_ID
        sync: false # Set this in the Render Dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
