services:
  - type: web
    name: jobhunt-pro
    env: python
    repo: https://github.com/samcv-sw/jobhunt-pro-swarm
    branch: main
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app_v2:app --host 0.0.0.0 --port 10000
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_MODE
        value: "1"
      - key: SUPABASE_URL
        value: https://zfvzqutgpdbsievsclhn.supabase.co
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.2"
