services:
  - type: web
    name: jobhunt-pro-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn web.app_v2:app --host 0.0.0.0 --port $PORT --workers 2"
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.12.0
