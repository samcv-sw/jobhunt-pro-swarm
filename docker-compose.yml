# ============================================
# JobHunt Pro - Production Docker Compose
# PostgreSQL + Redis + App + Nginx
# ============================================
# Note: `version` key removed — obsolete in Compose v2+

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jobhunt-postgres
    restart: always
    environment:
      POSTGRES_DB: jobhunt_pro
      POSTGRES_USER: jobhunt
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Do NOT expose 5432 to the host in production
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunt -d jobhunt_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jobhunt-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Do NOT expose 6379 to the host in production
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # JobHunt Pro Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD}@postgres:5432/jobhunt_pro
      - DATABASE_URL_SYNC=postgresql://jobhunt:${DB_PASSWORD}@postgres:5432/jobhunt_pro
      - REDIS_URL=redis://redis:6379/0
      - MAX_WORKERS=200
      - DAILY_SEND_LIMIT=2000
      - DB_PATH=/app/data/jobhunt_saas_v2.db
      - DRY_RUN=${DRY_RUN:-false}
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jobhunt-nginx
    restart: always
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jobhunt-frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      app:
        condition: service_healthy

  # Celery Worker (shares env with app via env_file)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-celery
    restart: always
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "-P", "solo"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD}@postgres:5432/jobhunt_pro

  # SQLite Sync Worker
  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-sync
    restart: always
    command: ["python", "-m", "backend.sync_worker"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD}@postgres:5432/jobhunt_pro

  # Certbot for Let's Encrypt SSL auto-renewal
  certbot:
    image: certbot/certbot
    container_name: jobhunt-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  app_data:
  app_logs:
  certbot_www:
  certbot_certs:
