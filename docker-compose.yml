# ============================================
# JobHunt Pro - Production Docker Compose
# PostgreSQL + Redis + App + Nginx
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jobhunt-postgres
    restart: always
    environment:
      POSTGRES_DB: jobhunt_pro
      POSTGRES_USER: jobhunt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobhunt_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunt -d jobhunt_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jobhunt-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # JobHunt Pro Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD:-jobhunt_secret_2026}@postgres:5432/jobhunt_pro
      - DATABASE_URL_SYNC=postgresql://jobhunt:${DB_PASSWORD:-jobhunt_secret_2026}@postgres:5432/jobhunt_pro
      - REDIS_URL=redis://redis:6379/0
      - CANDIDATE_EMAIL=${CANDIDATE_EMAIL}
      - CANDIDATE_PHONE=${CANDIDATE_PHONE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - BREVO_ACCOUNT_EMAIL=${BREVO_ACCOUNT_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GMAIL_SMTP_USER_1=${GMAIL_SMTP_USER_1}
      - GMAIL_APP_PASSWORD_1=${GMAIL_APP_PASSWORD_1}
      - GMAIL_SMTP_USER_2=${GMAIL_SMTP_USER_2}
      - GMAIL_APP_PASSWORD_2=${GMAIL_APP_PASSWORD_2}
      - OUTLOOK_USER_1=${OUTLOOK_USER_1}
      - OUTLOOK_PASSWORD_1=${OUTLOOK_PASSWORD_1}
      - MAX_WORKERS=200
      - DAILY_SEND_LIMIT=2000
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DRY_RUN=${DRY_RUN:-false}
      - DB_PATH=/app/data/jobhunt_saas_v2.db
      - CRYPTO_BTC_ADDRESS=${CRYPTO_BTC_ADDRESS:-}
      - CRYPTO_ETH_ADDRESS=${CRYPTO_ETH_ADDRESS:-}
      - CRYPTO_USDT_ADDRESS=${CRYPTO_USDT_ADDRESS:-}
      - CRYPTO_LTC_ADDRESS=${CRYPTO_LTC_ADDRESS:-}
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jobhunt-nginx
    restart: always
    depends_on:
      - app
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jobhunt-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - app

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-celery
    restart: always
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "-P", "solo"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD:-jobhunt_secret_2026}@postgres:5432/jobhunt_pro

  # SQLite Sync Worker
  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunt-sync
    restart: always
    command: ["python", "-m", "backend.sync_worker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobhunt:${DB_PASSWORD:-jobhunt_secret_2026}@postgres:5432/jobhunt_pro

  # Certbot for Let's Encrypt SSL (run once to get certs)
  certbot:
    image: certbot/certbot
    container_name: jobhunt-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  app_data:
  app_logs:
  certbot_www:
  certbot_certs:
